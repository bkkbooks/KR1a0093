body:
  text: 讀易餘言卷二明崔銑撰下經卦畧咸非本情無以動物咸則加心而名感有私意無以宰物感則去心而名咸雲龍風虎不期而至磁針珀芥無約而交㝠理自然莫之知其原也人則私心妄合鮮不失其情以賢助賢猶病其朋况於邪僻乎下卦感之淺五上感之未卦體止者静可也卦體説者貞可也心動而後足行拇徒志於四欲動未成腓上屬於股下連於足故居則得其本體而吉從初則凶股隨腓而動欲止不得何也感主於心百體從之爾主不役動將何為四當心位而貞貞者虚中无我之謂若上係於五下係於三朋比之急而大公是背所得者狹矣何以為貞乎五為梅核感上上以頰舌感五末甚矣此六爻不取應而取比盖咸速也拇腓股義取下體盖言无感人之道者勞而无成脢輔舌義取上體盖言无感人之實者煩而无益四為心心通萬變出令而非受令應物而不留物苟明屈信之自然貫物我為一體所謂聖人感人心而天下和平即天地感而萬物化生者朋亡不足言矣脢一曰背肉也殊與爻𧰼不合盖艮言止可取諸背咸言感所取皆動物拇而腓而股而心而喉之脢口之頰舌自下而上自末而顛有次序皆運用也凡人將行未行則拇自振揺將言未言則喉中宛轉拇者動腓股之漸脢者鼓頰舌之先恒恒有三善亨也无咎也利貞也𫝊曰乆於其道也其者每事之當然也利有攸往權之運也夫恒者可常斯乆或進或止或張或弛固非苦節艮限專而株守者也事君以道合則匪躬違則潔巳交友以直聴則用忠疏則全交協情中理恥辱不逮百代不易之法故曰終則有始也言應變无窮也初之无利三之羞上之凶過而失之也乆於其道日以浸深體巽務入始而求之三位重剛卦本柔遜其志不一上居動極而振何施而可故曰過而失之也二之悔四之田五之凶泥而失之也二剛在下失恒道也以居中僅得悔亡四居臣位无徳當之施政則道不敷撫民則澤不下九五至尊所宜流通仁義運天下於掌上而執一道守一方可乎故曰泥而失之也然則盡恒者其惟聖人乎日月得天而能乆照四時變化而能乆成聖人明如日月制用如四時故曰天下化成矣乆於其道為恒道者中而已矣垣而非徑也逺而非險也中庸不可能也故恒之六爻無善詞遯遯者逃内之外也王弼曰柔長故剛遯是也亨者四陽也當遯而去不制於隂小利貞者二隂也本卦為貞之卦為悔戒其勿變以逼陽也初六在下故曰遯尾四陽尚盛隂敵之則危戒其止而勿往六二隂又浸長執用牛革欲其留而勿進九三係遯位連也謂比二隂九四好遯情洽也謂應初九五嘉遯好逑也謂二五正應上九絶逺於外亡隂之疑肥謂饒裕也一曰三為賢人六二見三將避已而去心願執而留之是用其中順之道以革時者畜臣妾吉三與二比三若畜二如制臣妾則上三陽安其位否則否而至剥矣然非能宣暢剛大殞落羣小故曰不可大事也一曰下附二隂不任以權如剥之以宫人寵也或曰小人可為之謀與曰小人心奸性狠然畏罪避害相時順動亦猶人耳彼安肯妄為遂取殞滅之禍若盆成括之類小人之愚騃者不足道也故古有佞於隋而忠於唐者况遯之君子猶盛乎大壯四陽盛長小道將滅聖人喜之名曰大壯陽壯輕敵隂窮深謀聖人憂之抑其太過陽盛固天道之復用壯非君子之常得時得位不違謙則吉九二九四以陽居隂則吉九三過剛而觸藩况上六六五以弱據强何利之有易疆畔也四乃上卦之初之象大壯者用壯以濟時五居位體柔失其壯矣言陽進至四而五失之也中以自守不能闡揚剛徳𢎞濟生民但无悔而已大壯之五不美者不稱其位也若乾之五則利見也大壯之五比二隂夬之五比上所謂憂在腹心變生肘腋下之諸臣宜用艱危也藩皆謂上六也上六又言用壯之過至終不變凡亂之生由小人也凡陽之進决小人也隂性暗陽性明小人深謀而難測君子直道而多疎故常受反噬之禍而憂及宗社故壯夬多危詞嗚呼逺矣哉晉晉進也日出地中進進而麗于中天也大明在上羣隂順之然所惡於九四者為其間也據位擅權奪君之與幸有五之明不敢顯著貪食畏人便則動厲則縮碩䑕之𩔖焉故初則摧二則愁然君子安於下志於上豈可回心貶行妄附强援故皆曰貞吉摧者位也不得進則守貞㒺孚者徳也不見信則惟裕履順於正立誠於闇不涉邪偽无愧神明至幽王母將來福之矣升卦三二之升四曰虚邑履乎隂也晉卦初二之遇四曰鼫䑕阻于陽也四位不當是邪徳也然上有大明焉能遏三隂之附乎四得竊高位六五烏在其為明乎曰知人則哲惟帝其難之昔帝問登庸共兠被薦若非命揚側陋則舜且攸伏不聞然有帝如堯彼九四者行放之矣問曰初六六二其賢者與答曰執柔履順上附大明非賢而何專志在君不他應也初未受命二始有位三為一卦之首率其𩔖升人三為衆非四能間矣悔亡者求免咎於己勿恤者不責得於人徳未至者煩於物内无止者荒於外退而修徳因壘而降動而勤略雖盟而抗自明者能照奸用察者常受蔽王伯之辯逺闇之㡬也明夷日本在天其明乃光入于地中明之傷也聖人君子有明徳而遭亂世抑下位則宜艱苦自守不可附匪人與國事也上六傷明者而卒自傷紂之焚于臺也初九飛而垂翼君子剛徳不回時忌特深然位下事㣲舍爵椂而速去之㣲子是也六二曰左股股肱者臣之𧰼太顛閎夭脱文王于羑里也九三其武王之定殷亂乎盖與上六相應然有武之徳則可六四小人得志甘言諂計逢主之惡宣露于外市恩售權飛㢘之徒也五曰箕子與斯人處是世其道當如是也比干之死不利㣲子之權未貞也一曰初六為伯夷太公則二公不處君側无自受傷鳥被彈射則垂翅而不能飛盖君子被傷之𧰼斂戢而去亦為見㡬也醫書左手切心脉入于左腹者逢君之惡鈎致君心之術也得之則百方媚之乆之合一惟其言之是從假上行私无所不至如君好貨先以珍竒動之君好勇先以征伐投之也六四小人得志而作難六五君子失時而處難皆由上六之晦爾家人風自火出化自内始家人以女為奥主二四得正故利女貞初防早杜㣲二體柔服勤三為家之長寧嚴勿瀆四順徳以成内治五恭已以刑一家上九屋室之終惟信與威六二者其所謂女貞者乎初上治家之道也閑其邪於始正其範於終家永齊矣二四女正乎内也三五男正乎外也呉氏分為君臣之二家者鑿也在中饋則門庭之外非所履也无攸遂則壺飱之外非所與也父死從子則後世臨朝涖政者皆亂道也是故君崩子㓜擇賢宰而任之古之制也周得太姒宜家之福至于麟趾衛失莊姜宣淫之禍極于泂澤利女貞者一言而盡天下之道也禮别宫室詩歌蘋藻其六二之事乎閑家者令其守斯道而巳爾男不漁色婦不僻行故曰反身之謂也睽睽者目不相視兩情乖異也水火相悖而五柔主之以君應臣故小事吉註謂衣服飲食不待衆力者也天地賦形同於水火父母鞠育同於中少既而水火各一其性中少各儷其配則睽也然物窮反本睽極求合初九九四二剛不應初䘮馬不能致逺見惡且以辟咎至四元夫以孤而合矣二五失位居中各求其黨在難思濟者四遇于巷五往于宗周成之君臣是也三上居水火之極違離特甚其反本之謂乎始難終易无初有終聖人見庶𩔖之各遂憫物情之多懐使之適變成功故事无竟壊道无不振者與子夏𫝊曰取天下之物成天下之事異物相制或以相合弓矢小物合衆材之體成大器濟天下之務者豈止於一才矣水火濟而亨槖籥鼓而風雨晹時而茂物黍蘗和而成醴所謂睽而事𩔖也曳拖也引也使之前也牛角皆踊曰㸷言其用力也天作而乃改經文一作去髪元非正訓石介曰天謂上九君父稱天三應於上為四所間故為上九所疑欲刑及之銑曰輿曳牛㸷三應上而進之難也天且劓上疑三而絶其通也古人云一日不朝其間容刀況上下之隔又有九四之譖乎未有屈而不申誠而不白者至遇雨之吉則曳輿㸷牛之勤昭矣凡經文字改作别字及添一二字而足義者理必不然旋本訓反周折别一義也曳本訓拖引後之方為倒曳爾蹇蹇者行之艱也見險而止雖難其進度徳而處必拯其難也然必致民於寛廣生育之地不内之於險阻使民愈困尸此者其九五乎六二履中應之冒重隂而進盡瘁正邦事不一塗九三内卦之主二隂所恃古人所謂保一城守一國者五下應二三遂來比皆所謂朋也初六見險而止有知之譽六四反就於艮連陽之實上六蹇之盡處无可往者來碩者三也大人者五也得比得應蹇可濟矣六爻二五之外皆不利往而利來見險且止徐圗拯難之道其道伊何彖謂西南是巳二五之外餘爻不取應而取比盖蹇跛難於逺應故也見險而止斯不陷於險人立水上方能捄溺兵據要處才得解圍然不知其為險而以為易而蹈之者衆也故贊之曰知矣哉蹇至上六猶蹇也未能平險也解雨在雷之下則澤行人動險之外則事濟難去勢緩宜用平順无事而求功是又生難也故宜静有事而苟止是乃養難也故宜速六爻二五正應作難者三隂解之者二陽也九二田獲三狐田者有事也盖施武用剛力去小人聖人恐其猛而多傷教之曰得黄矢害除則止不求盡物九四居隂易比同黨初六在下應之甘媚親附故名曰拇初逺而二來矣六五非能解者守正委下維係於二二有君子之徳若曰爾以君子相維絡則有解而吉小人斯退聴也四去小人而君子至五雜君子而小人去二者相為去留李絳入而承璀出欽若守而冦準任也初隂在下九二解之甚易上隂在上九四解之甚難維言任君子之專獲言去小人之力六三負謂四乘謂二九四拇謂初咸卦同朋謂二上六公謂四隼謂上一曰拇謂三則拇指其甘媚趨附盤旋足下如韓嫣之類三則盗君子之器莽操之兇也一曰諸爻皆解六三彼剛大之事豈陰能為也故考訂如上所云位高擅權衆所附也喜佞惡正固人恒情故戒四曰解而拇損損之道二曰孚曰儉盖奉上之道易涉諂諛物殺之時當戒豐溢惟孚乃用儉否則嫌於簡薄也初九以損事為己任故遄往始損於下戒太甚故酌九二全柔再損則剥損下過深不為上益六三成卦之由三人損一者兩也一人得友者亦兩也萬化以兩而立増之則贅而滯减之則缺而廢六四大臣之位有偏柔之疾賴初之剛損之剛益而不全柔矣大臣改過福在天下不亦喜乎六五居尊柔而下人人皆歸之損三益上五比上則又益五也故曰或十朋之人助之龜弗克違鬼神福之也上九損極受益推以益下以人利人恵而不費𫉬兹三善宜矣秦罷列侯而睽孤漢削七國而背叛失酌損者也益明王恵下則天下歌舞其徳故曰利有攸往下受上賜必損軀效命報之也故曰利涉大川初九受大益者以大功當之為二隂之主不宜厚事擅九五之民故志於奉上乃元吉也六二居益以冲損四益初而二比初則四又益二也故曰或人神交助位不當尊守正則吉有臣如是王者信用之以亨帝如湯用伊尹格于皇天也六三以隂居陽失謙之徳捄凶則可六四與初正應成卦之由四依二遷初初依三遷四陽為君為實隂為民為虚故四告初而從自坤成震故曰國也六五不損於下為得志聖王之道惟益民而已上六益極當損而求之不巳立心勿常如是也而不知戒凶不亦宜乎初大作二大亨三大荒四大遷下之受益者也實五以大徳恵之百姓足君孰與不足信哉中行在卦之中也指三四禹錫𤣥圭告厥成功故皆曰用圭非常之舉非臣可專損之五益之二謙受益也益之上滿招損也損己益人者人益之損人益己者人損之故權利之府遜之猶有害况争者哉夬夬彖𫝊曰健而説决而和和者剛柔適中也惟健而説斯為和矣下三爻健也恐其過剛而鄰於暴故其詞抑之上二爻説也恐其過柔而流於惴故其詞進之丁易東曰四陽為壯五陽為夬大壯初九曰壯于趾此曰壯于前趾因大壯而言也九三壯于頄指上六也衆陽决之三則應之違正從邪有凶也然非三求之也或𫝑位相逼耳君子則决之又决如獨行遇雨將沾濡而怒之必與之絶隂陽合則雨壯于頄之譬也温嶠之於王敦𩔖此君子用誠温嶠濟以術内存兢惕外嚴號令周亞夫近之傕汜一起竟亡漢三思不去再亂唐君子不可恃盛也壯于頄三之位也有凶度其事𫝑爾未必然也君子夬夬九之剛也獨與上應和洽而雨覆説壯頄若濡未濡也巳愠而絶之覆説夬夬也此爻與隨九四相𩔖九四无意於三得三之係干上之有凶也有孚以明則何咎乎夬之三非附於上有上之遇犯衆之怒凶也夬夬有愠則无咎矣失中之得非中之是所謂善補過也姤一索之女為巽四畫之陽為壯初與四應㣲隂敵陽小人有不正之行而遇時君子危矣係于金柅四也爻雖以近者得之而男女正應不可廢也夫不字於四而即遇於二則淫狡之惡愧於屯之六二多矣夬下五陽上而决一隂也姤上五陽下而遇一隂也夬九四與上同體當羣陽上决之衝而五又比上故坐不安進不速姤九三與初同體當羣陽下遇之衝而二巳遇初故坐不安進不速夬必决而四不能引其𩔖姤可不遇而三不黨於隂其得失又有辯朱子發曰把大葉可隂譬則賢也𤓰可欲而内潰譬則民也九五遇九二之賢防民之潰此盡人謀以求勝天然不勝而隕墜亦天也九五知盡人謀不終舍天之命也盖天命我右下民者銑曰此爻難明子發之訓可通盖隂陽相勝如環斯循夬之極即姤也則治中生亂剥之終即復也則亂中生治其機運於天其謀成于人時哉時哉未有不反者聖人兢兢業業常早設防姤九五中正之君存有隕之慮故曰懼以終始其要无咎此之謂易之道也堯舍丹朱而禪舜舜用禹臯亂豈能剥治乎炎隕齊芳而𫝊衷衷用華頠治何得不亂乎故曰人定勝天二五皆以二制初盖因其遇之初而防之不然成遯君子望望而去又孰恃哉萃王者當大萃之時立廟祀焉得四海之懽事其先挈萬務之要統於孝然必大人為主聚道乃全夫物聚而多可以備禮人聚而衆可以集事此王者奉若天道事神使民也大祀者孝也順時者仁也仁且孝斯所以為大人而亨萃者乎有萃則分𩔖有𩔖則立黨有黨則起争五能萃二四能萃初近四无應則四萃三近五无應則五萃上咸在交争之際夫不能无争者𫝑也卒定于一者各隨其分也古謂十人逐兎一人得之九人袖手者也比以一陽得五隂故吉萃以二陽分四隂故悔九四有權失位九五有位失權四匪躬盡瘁斯免專民之咎五仁徳永修斯亡未光之悔初亂而後萃三萃而猶吝二五正應五用大牲君道隆故盡物也二用禴祭臣道恭惟致誠也上獨立无援求三三不應乘上上所惡危莫甚焉憂懼已甚衆所不害當萃之極而知憂其異乎安危利菑者與屯之世有主則皆定萃之世比𩔖則无争初九居萃之初柔无固守若號正應而固執之為人所笑勿恤也所應者正所持者專往而之四何咎哉一者所與專也握者所執固也一團之訓俗而无稽自上招下為引自下附上為援物聚而衆慮其難乆二以引而吉五以永貞而悔亡升柔以時升指初六至五也凡木根著於土生意漸達乘地氣而上榦而枝華而實是曰元亨元其生性也人之升也亦然必有徳斯以登用志在濟物用見大人以斯道干之也故曰有慶出於幽而向明離𨼆而仕也故曰南征吉巽剛坤柔柔順剛也初六巽陽而上上信其志而不以分九二剛中而應神享其徳而不在物三入坤順虚邑以待此下三爻升其位也六四上遜五尊升其徳六五下内二剛保其尊上居杳㝠進徳則可此上三爻升其徳也六四王用亨于岐山程子曰止其分升其徳美哉訓乎非文王之至徳不當此爻非程子之聖學不知此義王用亨于西山王用亨于岐山一曰亨作享祀之享則王者祀天地未聞偏祀一山者若曰文王之為伯也則未聞其有何盛事而𫝊之考古无稽徴禮不𩔖解經好異之弊也凡卦四剛五柔者四多不美雖豫之四亦涉臣强之疑故升之四發此一義以示臣恭困二之剛為初三二柔所掩四五之剛為三上二柔所掩塞其前後无由達也世否道衰小人得志嫉賢醜正君子或屏斥田里或囚係刑岸卦内險外説君子身困心通處困不能自通小人則然故曰貞大人吉无咎大人二五是也二在下亨已之困五居尊亨世之困亨已之困尚徳不尚言亨世之困以實不以令初六六三掩人實以自掩也死其至矣夫何利哉九二九五皆曰利用亨祀人不信其言鬼神孚其徳修于顯者人見之修于闇者鬼神格之舜在畎畆父頑弟傲䕫䕫一心達之上下文王在商虎譖紂囚翼翼自戢昭來上帝學者豈因昭昭修徳豈為㝠㝠墮行難不入慮窮不改操曾子之貧孟子之不遇厲行成道之資也大矣九二困于酒食窮而自養増益所不能九五劓刖尊而拯難刑戮所不服朱紱方來待君寵也困于赤紱失臣翼也赤紱所以為行步之飾困于者不能行也上六困極而求通之詞也困者塞而不能行故以征為吉征者體道而逹變也知剛不可乘而下之是曰親君子知柔不可係而絶之是曰去小人士而修徳徳必修君而拯世世必治井井言乎徳性也終日汲之不言損終日注之不言溢在于己者无待于外也是故徳壊于習修學則大成泉敝于甕修井則常新三隂爻井之所也不修而泥人所不食甃其内収其口斯完井也三陽爻井之泉也井敝而水下注人不得食渫其泥水乃冽故曰寒泉也雖然无人汲之有口幕之猶為棄井渇於暑而坐斃靡伸一勺之濟非井之罪也君子徳性完潔可以化民而王明未際徒抱利器此係君與民之幸不幸耳我道何損焉君子之體井也有四徳取其常行取其清義取其博施而不窮善取其有終而不厭収夏冠之名以収髪為義今作井者至上圎而狹之或用片石鑿孔以覆名曰井口以幕盖之則不可汲又作磚井者自下至上甃磚圎而長似甕形𢎞治中湖廣民掘地得廢井者乃用一罁无底比用磚更徑約也江河流通之水皆有汚染故味别惟泉天一之真味也革革之道三曰時曰位曰才程𫝊明之下三爻酌時而革上三爻成革而變九四大臣相君行革者不曰順命而曰改命夫革者前政之弊改而别創也立法作度使民更新必也永終知敝使後亡害君曰可而有否臣否之君以為利而貽患臣患之如後世批敇塗詔者盖臣誠心朴忠上所素信雖易已事違予言知有大益於國也昔舜曰吁禹俞之皐曰都禹吁之君臣亡嫌僚友亡猜述己功而不避其誇陳君戒而不憚其激直如心役四體體從心令莫知其然而然非至信孰能如是井之後㡭以革者君子修徳有常適用有變也不然恒其徳貞夫子有凶矣二五水火之交故為卦之主爻鼎鼎言乎才器也器有大小隨量而受也鼎取新故初利出否盖前亨之漬也二有實慎其妄從三耳革待其虧悔井鼎俱以上出為功井戒勿幕鼎貴有耳鼎三雉膏可用亨養而四間之大臣行讒於君而賢者受疑矣五之耳改則三之行塞然上帝之亨聖賢之養固不可廢也三之食可待矣四近阻三之膏而反應初之否折足之凶可免乎大臣而信用匪人凶如何也五耳也以上為鉉以九為金虚以待鉉柔以内剛君之聖也上鉉也以九為鉉以上為玉剛以為質柔以為用臣之節也君於臣惟恐其有所畏難而直不盡故曰金臣於君雖致其无不忠信而恭不替故曰玉鉉若後世之風諫詭對歸美引咎皆玉鉉也初之顛去惡也四之折棄美也初虚鼎也四實鼎也震處震之道彖盡之二五又别發一義總括之有三一曰有主二曰懼三曰遜震動也大難廹之也處之道曰不喪匕鬯仁人孝子之奉祀精誠之至也變忽起前而亡移心處難者如是則无難矣古之人有之文王羑里而作彖孔子被圍而絃歌五之无䘮有事亦此也雷之怒天之威行也驚恐者致其福惰慢者致其災古之人有之高宗雉雊而司敬宣王遇旱而修行三之震行无眚亦此也安其位而不知避則䘮其位怙其有而不知予則殞其軀以巳裁物者存以物逐己者亡古之人有之太王之去邠西伯之率叛上之畏鄰戒亦此也五其長子乎不䘮匕鬯即無䘮有事也艮艮止也戢其身而弗遷也處之宜曰艮其背夫人資衆體以為用耳目止則廢視聴手足止則廢持行惟背可止不運亡見也𫝊曰時止則止時行則行言人必如是乃為全徳艮背乃止得其所雖有静亡動事若偏而道當然伯夷之餓首陽箕子之適朝鮮志存大倫可矣震來自外艮止自我皆非常之故先儒動止静止亡人亡我之訓語高而理不協夫易聖人處身履運之方母以是内非外之心求之震為雷雷震有時艮為山山止有定恐人法此止静失於動用故𫝊兼行言之猶損之言益也下三爻止之不固者有失上三爻止之善者全得君子以濟物為心其心若止忘天下也止其躬者有為在心但身不行耳曾子窮居而作大學垂王者之法於世可以當之咸四為心位面不相見否之道也故惟背可止傴僂為躬亦背也故𫝊以釋身字漸漸者進有次序不急遽也彖言女爻言鴻盖臣事君女從夫鴻隨陽皆以漸其事相𩔖臣不貳適女不更嫁鴻不再偶俱以正其道亦同𫝊言漸之善有四進得位往有功也謂六往居四位者致用之宅才而无位則難施位而過才則不稱故得位一也進以正可以正邦也四者諸侯之位君子之進正人而已已不正未有能正諸人者三以正進四以正交女得所歸富家大吉故得正二也其位剛得中也剛來居三陽爻之中至五則進極而无所之故得中三也止而巽動不窮也人動以欲躁而失正内艮止外巽順無慕利之私有難進之禮而三四之動不困故止而巽四也此卦本以坤三往四成巽女乾四來三成艮男名曰漸諸家各解彖傳今頗采朱子發之義訓釋如右干涯也磐石也陸平也水邊初起之鴻臣在下位之象木杪也陵阜也阿山也空中高飛之鴻臣在高位之象也小子厲有言士之初進持正極言小人所忌止而須之可也唐元􅍬初年不苟合上書言事特不堪困躓遂附中官名行蕩然飲食衎衎止而不急於進養徳俟時故曰不素飽也三四成卦之主俱以无應但因隂陽相比而合三居止之極而重剛不中上下之際故失静止之徳犯躁妄之戒三征四孕非配故不復非夫故不育此士之妄相朋附而扳援窺利者也異體而得有同心之義故曰利禦冦六四飛而過於木之上回翔人間得平柯而止之且未即沖天凌霄也將登高位而擇所可居故无咎臣皆欲得君而事之君亦廣求臣而使之故二五正應未即合也五近於四四亦欲以為夫二近於三三亦欲以為婦乆而他議寢後乃正配諧勝堪也任也非相争之義上九陸作阿地既相近韻與儀叶羽翮肅肅羣飛有序賢人君子登公輔之位不為名位所動徳業光大天下望而則之歸妹漸曰女歸統言之此曰歸妹有帝乙有君有娣則國君之配長子歸之長子即君之當位者周南之化正家為先嫡妾紊則嗣子奪邦家之亂由是故聖人慎始男女合而子姓生子姓壯而父母老老者去而壯者與息而復然終而又始若曰女之終婦之始宜曰妹不可曰人天地交而萬物興猶男女合而子姓出天地亡壊故曰大義人有生死故曰終始六爻之序初三娣也五妹也震歸之故稱帝乙九二不言歸妹其妹之夫邪卦至四爻女猶在室故曰愆期至五即嫁故曰有時三以隂居陽履非其正急售而為須四有摽梅之歎得長兄之依遲正而成昏五之袂不及娣五之月則及望配陽為明至滿而挹貞徳之著豈事容飾乎上六士刲羊无血男不成昏女承筐无實女不得嫁歸妹人倫之始終君子以永終知敝故卦之終而著道之敝也呉㓜清曰漸男方求女之事歸妹女將歸男之時以未成夫婦而名卦也咸男女初合相與之情恒男女成配乆處之道以既成夫婦而名卦也豐豐盈之時猶人之壯盛也恃强无節百病肇之人君於是時其憂乎其喜乎盖庸主之所喜明王之所憂也然則徒憂乎聖人教之曰宜如日之方中已无暗徳下无隠情天下莫得藏慝畜奸則常豐矣自初至五忌夫闇昧貴於光大上六則痛言奸臣蔽主之害也李簡曰自古隂邪小人蒙蔽其君之明者何君明必憂危亡親君子則小人疎斥矣故仇士良傳其心秘於其徒曰天子不可令常閒宜以奢靡娛其耳目无暇更及他事然後吾軰得志慎勿使之讀書親儒臣聖人作易逆發其心之至隠而曉以禍之必然曰汝之掩君之明欲豐乎巳之屋而專天寵者適所以揜其家而空其居也真景元曰小人但知竊權固寵為榮不知國亡則權寵无自保之理故秦危而斯高戮漢壊而張趙誅保豐之道曰宜日中故蔀也沛也蔽明者皆忌孚也章也配者夷者明之助也皆吉旅旅盖古之寄公寓賢或公子避患而奔潛於戚國或大夫以道而去留於他邦猶欲乗機而入賜環而反聖人取旅人晝食夜宿憑高望逺依山舉火者名卦曰旅示以去處之宜母令避患而得患用道而失道焉六爻六五九三為旅人初言其時二四上言其地旅貴得衆而初瑣瑣失之矣二曰即次暫止也故曰左次曰師次四曰于處安處也故曰出處曰處仁二始在旅待時而發姑且須之故次為善晉文在狄是也行必赴家避難必求濟旅必有歸可以安之而亡計乎雖得資斧之利其心不快狐趙不欲晉文在齊是也處旅用柔而不撓不變心存乎剛五中三過故五得譽命三遭焚次况於上九事窮无變好剛不已不可處不能行有號咷而已王烈之賢不能處遼東况其下乎楊廷秀曰六五王之蒙塵者少康逃虞思國宣王匿召公家是也禍亂之作天其啟聖人者乎上逮者聞于天也射雉一矢亡射雉出旅也雖有亡矢之害而卒濟巽巽之立卦初與四也二五雖據用事之地權不在手故曰剛巽乎中正而志行言必用初與四而後得志也初與四有權而非用事之地故曰柔皆順乎剛是以小亨言必順二與五而後亨也利有攸往為于二五也二五大人也有權无位非大人孰容之巽者徳之制也又為行權宣布政教芟除强梗非專執柔者况風亦有落木摧物之象焉初下不果宣命行事之初利於勇而行則正也故曰武人四承尊履正體柔用剛行命有功故獲三品盖去不仁削大患者二卑巽矣以之事神則可達已之誠不厭其丁寧煩複也五中正矣以之宣令則利齊物以漸必用其詳審周信也三煩數之令人所厭也故吝上巽窮之地威不行也故凶甲事之始也庚事當革也以十干取義自甲至戊已春夏生物之氣已備庚者秋冬成物之氣也故改生為殺改榮為枯改燠為寒凉改露為霜雪故四之田而獲五之初與終皆有用剛正物之義焉五直曰先庚後庚矣兑朱子曰若不剛中則違道干譽便成邪媚下面許多道理皆由此出銑曰革與兌𫝊皆曰順天應人盖去舊易流於暴説民易流於邪天道之當然者推故乃所以成新人心之同然者有事正所以省事否則盗賊竊湯武之名窮黷假春秋之義民其多艱矣哉初不比於隂與二相説以中節交君子君子得以用其忠故吉二雖説於初與三相比以誠心待小人小人无所用其奸故悔亡五之中實孚于上猶二之中實孚于三也然隂在下之物必剥陽已盡而後至上也君子以誠待之而小人未必无相害之心有厲者度其事勢如此不可不豫為之戒也六三之來來上也上六之引引三也小人在上則援其同惡之人進列在下則致其同惡之倖就已二小人合則君蠧而國危九四以剛得位又居二邪之間介而别之伐其交離其萃然需乃事賊遲則㡬失故貴乎疾君无孚剥之厲喜大矣商兌謀處二隂未寧者計未定也聖人告之曰介疾也渙渙者小人遭難離散而避之大人立徳與功解難釋險也王假有廟萃神之渙利涉大川捄民之渙尸此者其二四乎二以剛在隂中力能濟也四以柔在隂外動无違也六爻初在渙始為力易而戒後時故用馬壯二奔隂中其來速而得安倚故曰其机馬與机皆本爻之象此二爻自捄其難也四為巽主風以散之在水上則激波在氷際則解凍四近不比三逺不應初三與初无所用其黨附之私故為渙其羣而致一以承五然散小羣而成大羣其聚如丘大臣勞來安集之用靖王室不夷其慮九五君位所謂出令者曰汗言其信也曰大言其道也五出之四行而致之民此二爻捄世之難也上九處險之外居巽之極若張翰之避趙王倫者六四九五為渙之主可依之成功而三獨應上是无拯渙之心惟求自危而已一曰卦自否變二柔之四為渙其羣此但可曰離其羣非渙也况卦變自如程傳本之説卦其餘支離穿鑿節節者有分限而不可踰之名在學則約情寡欲以養徳在政則作制明禁以齊民然協諸義合於中可常不厭故申徒狄之忠陳仲子之㢘不可恒諸巳墨翟之儉許行之耕不可施之民二不應五故當節而不節三居澤溢故過節而不節初因二塞而不出故无咎下三爻皆未善四守節以承上安則非勉五制節以一民甘則適中上至卦終而不變故貞凶上二爻皆盡善然禮奢寧儉未有刻意尚行失身取災者故曰悔亡炎上作苦人所不堪稼穡作甘人所不厭聖人之制致嚴慎則不可踰也然禮之宜情之實非矯而為之民之循之也乆則嫌間不生義分相浹如魚依水如鳥在林雖一日違之而不能苟一事外之即不安履禮也而用兌節約也而貴甘此聖人之中萬世由之也與履戒夬節戒苦一偏之行君子不由也故曰中焉止矣中孚孚者鳥卵之實柔在内而剛外包之也初九虞吉居信之初貴夫專一戒於二三惟四是從六四馬亡近上之位臣而擅有逼則取咎惟率下奉上雖以蕭長倩之大節李文饒之偉業俱以朋比失之馬亡之義大矣鶴陽鳥也其飛冲霄其音聞逺而鳴乃在隂山之下澤之中幽暗甚矣言其誠之至也實用其力而徳成于内誠之謂也誠則形而動子和之爵靡之不期而然也翰音為雞但栖於塒翔於地飛類之走者風傳其音于天而實不能舉聞過其情无以副之日見敗露雖貞亦凶况非貞乎二居中上處窮鶴高而就下雞下而登上中孚成卦以柔在内而剛得中也上九剛在外而不中中无其實世有取虚名而委之任重鮮不僨事趙括拒秦兵殷浩正桓温是也小過亨利貞可小事不可大事謂四隂也飛鳥遺之音不宜上宜下大吉謂二陽也初在卦始而鋭上居卦終而極飛鳥雖凶上有災眚黨錮盡而閹豎滅偽學禁而侂胄誅小人之讎君子能自免乎善人國之紀害之則逆天也逆天者亡二五中也聖人教之處過之宜祖謂人之始初六是也妣配祖君謂臣之主九三是也臣服君位過其祖與之配進則遜君反於臣隂可過陽不可過如是者无咎妣與臣皆指六二也六五隂盛陽㣲不洽為雨以六之在上也弋之則解位過非𦙍徳之美弋取非撥亂之才所謂小事也君子處小人之下彼猶忌其賢而戾其升苟過之則百方害之九三弗過上六當為之防一小人生心其羣叢起而助之虐或戕謂初也九四弗過五而遇謂承之也雖曰无咎當戒往而永貞三為二隂之主故凶四居二隂之下故无咎九四君子之失位者雖遜以遇之亦不與同流而往子之於陽貨是也往則與小人同受其敗時之從蔡京是也小人雖一時得志而終不乆君子敬徳潔已逺利與害以待天之復而已矣弗過遇之君子待小人之恭弗遇過之小人凌君子之横六五之權不能雨盖有穴其間而為之間者上六也不仁居亢以屯其膏小人恃君之寵居高位而播惡於衆君徳為之累夫君子苟无意於盗弋而去之隂過之禍息吾心明於天下矣隂過之世君子上則為隂類所嫉取禍下則擇卑處自晦全身是故小官下邑無權可争陳寔是也埋光鏟采无名可忌申屠蟠是也皆所謂下也既濟度水已竟曰濟二物相資成用曰濟水在上以金盛之則不滅火火在下以木傳之則能熱水亨飪之功萬民以濟夫治亂相尋貞者則勝初吉未濟變為既濟也終亂既濟復入未濟也進而不巳則无終止而不修則肇亂初九曳其輪者進也濡其尾可以濟而不遽也六二與五正應需而未行虞廷儆戒无虞在於野无遺賢世之方平以士為无益而忽之者衆也始䘮茀而七日得之程子謂中正之道无終廢者也九三令主伐夷憊而始克盖時過力怠所謂有生之樂无死之志故也六四盛極而衰美繻而為弊袽其曰有者言其必然終日戒則盛可保矣大臣懐忠憂國者也九五謂盛不如衰盛則恃而怠則亂衰則懼而修則治東鄰既濟也西鄰未濟也備物者誠不至致誠者物則簡鬼神享誠而不在物上六妄進違時厲之道與茀者車之蔽䘮之則不可行女子擁面出門况乘車乎一曰寒始索裘晚矣繻而又有衣袽廣備也初濡尾自止而防後也上濡首自恃不慮前也厯險无防舍溺奚適故曰亂者有其治者也未濟火上水下未能亨飪故曰未濟卦始乾坤正君臣也終既未著世變也天地之大徳曰生隂陽之迭運曰易天運於上地載於下水火交化於其中萬物生生而不窮君宰於上臣勞於下徳政並用於其民萬世秩秩而不亂乆之運頺而匪人任則世亂而賴人拯治之極者亂之始也亂之極者治之始也是故易終未濟春秋終𫉬麟所以章天之心而啟後人之圗治也與初亂之始涉之首故濡尾二任之重事之勞故曳輪未濟者盖有待也戒於征而畜全力可以涉險四居明之初體剛之質伐叛有功五任賢勿貳付物以能有孚而吉未之上盖既濟也享其誠而孚飲酒貴於知節夫飲酒无咎自未濟而入既濟也濡首失是自既濟而復未濟也所以見人事无常天道多變嗚呼致亂易反治難從欲易守道難君子退易小人退難是以常有千年之亂鮮有百年之治坎輪離牛牛力曳輪上承五命非不進也震為長子用四伐叛有徳之君親征不足貴用得其人大國即震之有也震用其蠱之有子者與二之曳輪忠臣也鞠躬盡瘁知无不為四之震用功臣也帥師宣力兵无不克五以孚而任之斯以反未濟為既濟乎以柔處明貞乃吉而无咎下任九二君子之光也下賢為謙謙尊而光光涉於外故又曰有孚暉者日中之氣管輅曰日中為光朝日為暉凡彖𫝊𧰼𫝊即易解也往來上下承乗比應位也繫詞所謂相攻相感相取相得情也以是考之易可言矣自術緯之附㑹方士之卦圗紛紜争售乃混易之義亂易之象今一切刪削專宗孔氏若步康莊之夷焉讀易餘言卷二
