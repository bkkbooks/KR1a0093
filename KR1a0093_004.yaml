body:
  text: 讀易餘言卷四明崔銑撰繫辭輯上古云夫子晚而好易韋編三絶而為之贊蓋彖象二傳按畫取象字解句釋矣繫辭兩篇合三聖之文上通天地而發其嘖上篇贊伏羲之卦兼及於辭下篇贊文王周公之辭上本於卦其稱易者為類有五一曰造化二曰德業三曰卦四曰蓍五曰辭造化命於人為德業象以卦動以策明以辭皆發德業之實古之注者或失則髙虛或泥則術緯或混則浮談濫語惟朱子本義陳理平正吳澄纂言為訓明切今多本之采取衆長僭列管見以為精思者之階云爾天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣吳幼清曰此贊聖人因天地自然之理而作易也天陽之輕清尊而在上地隂之重濁卑而在下乾坤以三畫者言定其方位乾上擬天坤下擬地也澤山屮木自卑而髙陳列兩間貴賤以六位言自下而上猶衆植之列也天運則陽常動地填則隂常靜剛柔以竒偶二畫言竒之剛猶陽動之實而一偶之柔猶隂靜之虛而二也東西南北其人以類聚羽毛鱗介其物以羣分吉凶以蓍之占言卦之六位比應相得而吉否則凶猶人物之聚與分有乖有和也成形於地者升而在天則成日月星辰之象成象於天者降而在地則成水火土石之形變化以蓍之畫言或剛變而化柔或柔變而化剛猶象與形之升降也新者漸長曰變舊者漸盡曰化是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女此章乾坤六子用卦之名贊造化之實後人拘於卦名乃謬見也古注云相切摩言隂陽之交感相浮蕩言運化之推移是也摩謂以一石磑石上蕩猶以一氣飄水靣雷霆以聲動氣剛者行風雨以氣滋形柔者堅所以生萬物也日為暑夏至日道近極暑之候月為寒冬至月道近極寒之候所以行四時也皆乾坤之用也故乾德之健成其為男而稱父坤德之順成其為女而稱母乾知大始坤作成物乾以易知坤以簡能吳幼清曰始者氣成者質知者主之而無心作者為之而有迹乾之健其知也宰物而不勞心故易坤之順其作也從陽而不造事故簡本義曰承上文而言乾坤之理陽先隂後陽施隂受陽之輕清無形而隂之重濁有迹也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣本義曰此言人體乾坤之道也人之所行如乾之易則其心明白而易知與之同心者多故有親如坤之簡則其事要約而易從與之協力者衆故有功一於內故可久兼於外故可大德得於已業成於事至成位乎中則與天地參矣銑曰易簡非理也由此以得天下之理也蓋物各有則事皆定理猶乾之必健必成男坤之必順必成女人循理依則不參以僞甚易甚簡一以貫之與物同體若私已縱欲伏奸行詐於人相攻於行則躓矣此一章天地也卑髙也動靜也類羣而形與象也天地原有之易也乾坤也剛柔也貴賤也吉與凶而變化也聖人今作之易也此十者總為剛柔分為八卦八卦統於乾坤乾坤之道易簡人而兼體之則亦天地也然則易者人有之成之為聖失之為愚也聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化聖人指文王周公也文王之重卦也皆象二體立名已乃觀其所肖似作彖周公又於各爻作詞皆明占之為吉為凶上古淳質觀畫知占中古多故得詞方明也又以剛柔二畫相推生六爻之變化柔推剛則剛化柔剛推柔則柔化剛即九六之變剛柔兩盛則為相摩剛柔迭勝則為相推是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也本義曰吉凶悔吝易之詞得失憂虞事之變得則吉失則凶憂虞亦足以取悔吝吉凶相對悔吝居中悔趨于吉吝向乎凶銑曰剛變化柔象陽退而隂進柔變化剛象隂退而陽進剛為柔象自晝而夜柔化剛象自夜而晝失得憂虞人事也吉凶悔吝象之進退晝夜天地也變化剛柔象之是六爻言人兼有三極之道也三才同一至極之理故曰極是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利易之序依虞翻本作易之象所居而安如安土之安象者文王名卦之象卦之體靜也所樂而玩如樂天之樂辭者周公繫爻之詞爻之用動也是故君子居則觀其象而玩其辭無事學易之方動則觀其變而玩其占有作用易之道如乾之小畜是變也或躍在淵是占也可以進而遲之用九四之道也君子尊奉易象居身處事動與吉㑹凶咎逺矣此二章贊聖人繫辭之㫖也吳幼清曰文王之彖本象故言象以該詞周公之爻用辭故言辭以該象彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之象者兩體之肖擬其形容也變者九六之動適於時宜也失得者得正言吉失位言凶也悔吝有小疵而無大過也無咎能善補則無過也位者二五功譽三四凶懼初始上終得位者貴失位者賤也齊猶正也隂卦為小陽卦為大各有名義名則乾坤大井鼎小義則否泰大賁旅小也辭者彖爻之繇吉有元吉終吉貞吉之類凶有貞凶征凶見凶之類也介者吉凶之間早見預處則純吉悔者已成之事能畏速改則為善張敬夫曰指其所之告之險欲其動心而有懼告之易欲其安意而無疑銑曰此三章釋卦爻之㫖文王周公所作者也介者誠於思而豫悔者改其為而速能是二者吉無不利作易者示人以要道也易與天地凖故能彌綸天地之道吳幼清曰易指卦象蓍數伏羲作者凖平等也彌如開弓愈開愈滿綸如合繩漸合漸大充而廣之與天地一道也仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之說精氣為物逰魂為變是故知鬼神之情狀天垂日星其行交錯故曰文地竅山川其列有條故曰理天陽也著形於外故明地隂也具質於內故幽程子謂在理為幽成象為明是也隂陽交合物之始也隂陽分離物之終也合則生離則死原者本其所從來反者復其所歸往氣之精者聚則為物自無而有為神魂之遊者散則為變自有而無為鬼情言體狀言用知鬼神則知生死本義曰此窮理之事也李氏曰形生於精也氣與精融而生形也至精湛寂非氣不作一氣回旋非精不凝相㑹而物生魂乘乎一氣浮遊于無窮其於形也直寄焉魄隂物形之主也魂陽物從神而已其交物者魄也其所與交物者神也其守形不離者魄也然而有異於此者特為其滋澤而未稿且往來而不停也若人之死精水耗而就涸其涸也麗乎土氣火散而不收其耗也隨乎風逰魂為變與氣同散而已與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛與天相似者道也所謂先天而天弗違也知足以周萬物過之則為鑿道足以濟天下過之則為兼愛聖人用易故不過也本義曰旁行者行權之知不流者守正之仁銑曰樂天安其在我者知命付之所遇者夫何憂安土者不擇地敦仁者惟廣施故能愛樂天知命者重內輕外安土敦仁者約巳厚物本義曰此盡性之事也範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體範鑄金模也模範在外圍繞得天地之化在其中而莫能越乎此五十之策行鬼神八卦之象通神明消長之定則盈虧之必數是也曲謂一偏纎息成完而一物不遺尚象制器以生民命立卦生蓍以周民用觀變裁動以貞民德趨吉避凶以保民泰是也晝夜相代循環無窮通貫為一而能知之吉凶貞勝盛衰迭王否泰之反姤復之變是也神無方天地也妙萬物易無體卦象也達萬變上文言聖人身備大道而神知之用以作易其貫兩儀括萬有知存亡如此三者所謂彌綸天地之道而與之凖者也一隂一陽之謂道吳幼清曰天地間隂陽二氣而已聖人合卦象蓍數而名曰易者取隂陽互相更易之義此專言隂陽二字見易者此也一隂一陽循環無端也銑曰孤陽不成孤隂不生二者迭運化生無窮故謂之道也繼之者善也成之者性也仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣潘氏曰一隂一陽交相為用所以為道繼之者道無間斷善也成之者渾然天成性也李簡曰性出於繼善則性豈有不善乎孟子之論原於此仁者見其道濟天下得易之體也知者見其知周萬物得易之用也謂易止於是而已百姓愚暗雖日由之而不知故君子之道鮮矣銑曰此四章贊聖人體道作易人不能全之也此章舊解不協者有二其一曰聖人以易窮理也夫易之未作道在天地易之已作道在卦畫聖人蘊之為德行行之為事業筆之為易易因聖人作之而立名也若曰後人用易則可矣其一曰隂陽氣也所以一隂一陽道也夫太極動而生陽靜而生隂混而言之曰太極分而言之曰隂陽以位而言氣之浮為陽質之凝為隂以氣而言陽伸則煥而明隂屈則寒而晦天地由是而運萬物由是而生死言其流行謂之道言其真實謂之誠言其條達謂之理言其妙合適可謂之中言其於穆不已謂之命言其靈妙謂之神故曰一隂一陽之謂道猶曰率性之謂道也何為乎求道於外耶又曰天之道隂陽地之道剛柔人之道仁義皆氣之中也一也說者有見乎愆伏乖戾之氣以為是隂陽也不可以為道也而别為之說詁訓不通名實咸謬矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神顯於仁上藏在用中窮冬白地逢春而物萌芽可見其仁自芽之後形形色色皆造化也人但知物之長茂耳非藏乎乾坤變化物受氣而自成乾坤何心焉聖人率作興事屢省乃成故曰不與聖人同憂富有者發育之大纎息無遺日新者發育之功禪繼無巳大自外見故曰業功由內樞故曰德生化蕃鮮謂之易象可見者健也謂之乾法是效者順也謂之坤窮過扐之數因數以知來謂之占貫十有八之變因變以應物謂之事隂陽變化不可測之謂神張子曰兩在故不測是也夫天地德業者易也統於乾坤周於占事而妙用曰神此五章贊天地之易也舊解不協者二其一曰藏諸用者秋冬也詳經㫖蓋言天地無心之妙方與聖人不同憂爾其一曰生生之謂易謂隂陽相生理與書皆然夫陽之氣行乎隂隂之質含乎陽然後物從而生隂陽相依相須則可天道即人事也謂已長之男女相生可乎一生二以至六十四邵子用數以測易也豈混元之實始哉吳氏穿鑿迂泥尤為蕪經者乎夫易廣矣大矣以言乎遠則不禦以言乎邇則靜而正以言乎天地之間則備矣易者隂陽之變也廣矣大矣贊之也推而行之謂之通不禦也天下之動貞夫一靜而正也天地之間則備矣總言之夫乾其靜也専其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉疏曰乾是純陽德能普被無所偏二惟專一而已若其運動則剛而得正不可屈撓坤是隂柔閉藏翕斂動則開生萬物本義曰乾坤各有動靜於其四德見之靜體而動用靜别而動交也乾一而實故以質言而曰大坤二而虛故以量言而曰廣天之形雖包乎地之外其氣常行乎地之中銑曰乾常動而曰靜言其收物也坤常靜而曰動言其生物也乾不交為靜坤上交乾為動氣之謂也非其形之謂也聖人論天地於其生生見之後人則談虛入誕矣廣大配天地變通配四時隂陽之義配日月易簡之善配至德配合也以此名加之彼實之謂也廣大者是天地也蓋廣大也變通也隂陽之義也易簡之善也名也天地也日月也四時也至德也實也張敬夫曰乾始坤成廣大配天地也闔闢往來終則有始變通配四時也銑曰日昱晝為陽月昱夜為隂代明相易其義一易德之健簡德之承固有不逆其善也廣大變通隂陽逺不可禦易簡之善靜而正故曰天地之間備矣此六章贊天地之易也乾坤實體也四時日月乾坤之運也易簡至德其主宰也易其至矣乎夫易聖人所以崇德而廣業也智崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門易字自聖人所履者言蓋備此四德故有此聖創也夫易者何也聖人德業是也聖人何如崇德知而已知以通故崇之使髙明如天何如廣業禮而已禮以踐故卑之使平實如地則與天地並立而三天上地下聖人之易行乎中成性存存道義之門易即理也性中之固有也存其固有者性之成道義由此而出明道曰盡天理便是易一言盡之矣上章言造化之易以廣大贊之此章言聖人之易以至贊之蓋探本窮源道其末流之自德業實體也道義之門其變通之四時代明之日月也智禮其主宰也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之象而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化天下之理賾而難見聖人謂空言不能明也故擬之於有狀可見者摹倣卦之宜稱謂之象以易見之物比難見之義則賾者明矣天下之事動而難窮聖人謂遍言有不暇也故取剛柔兩畫觀其與人事㑹通者以行其典禮繫之以辭决其吉凶謂之爻以典禮處事則動者定矣有理故至賾不可惡有要故至動不可亂君子擬此爻象而後言議此爻象而後動所以成其變化變化者人之出處語默也吳幼清曰賾頥中深處形容如天地電日水泉山澤雷風雲雨是也物畫也儀禮畫地置足亦曰物文王象物之宜稱者名卦如與雲雷相稱則曰屯與山泉相稱則曰蒙或以為龍馬之類則彖辭中所言之象甚少不應舍爻名彖故知此是文王所立卦名也動人之作為㑹自彼來者靣靣可至通自此往者方方可達典五典禮五禮擬者比類於物以取義議者講度其理以處事銑曰此八章贊文王周公名卦繫爻之義也此下釋中孚九二爻共七節在此無所繫屬吳氏取為文言傳自作一卷今從之其他考定復句衍字並以為定本云天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也天地者即隂陽也數有名之始故以天地言之有形而可稽也天之氣専直故數竒而一地之形翕闢故數偶而二自上漸加至天九地十而數成矣天數五者一三五七九地數五者二四六八十天之五數自相得地之五數自相得有合者謂竒偶一與六二與七之類也相得如兄弟同體聚也相合如夫婦異體交也一三五七九總之為二十有五二四六八十總之為三十共五十有五聖人因數生蓍有五十之數而九六之變化生矣變生乃以未來之吉凶告人所謂行鬼神也人幹事於明鬼神司其柄於幽惟蓍知之大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後掛程子曰數始於一備於五小衍之成十大衍之成五十吕氏曰參天兩地而為五故十者兩其五也五十者十其五也吳幼清曰其用四十有九衍母之一數之所起故虛其一不用所用者七七一為體七為用也本義曰兩天地也掛懸其一於左手小指間也三三才也揲間而數之也竒所揲四數之餘也扐勒於左手中三指之間也閏積月之餘日而成月也五歲之間再積日而再成月故五歲有兩閏然後别起積分如一掛之後左右各一揲而一扐故五者之中凡有再扐然後别起一掛也銑曰天地之數五十有五而大衍之數虛其五蓋數之生者五而已自五以上為成數五者數之母也虛而不用猶五十之去一也算法用九不用十蓍法不用五十而用四十九蓋參差而後起變若截然之目何用計度天道人事皆然微哉微哉李鼎祚曰大衍之數減一併五備設六爻之位蓍卦兩兼終極天地五十有五之數也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也凡揲蓍第三變九揲得三十六為老陽八揲得三十二為少隂七揲得二十八為少陽六揲得二十四為老隂周易主變止用九六故成卦之策陽以三十六六之為二百十六隂以二十四六之為一百四十四總之三百有六十每歲以二十四氣計則三百六十五日有餘以十二月朔計則三百五十四日有餘折中之為三百六十日也上下經六十四卦三百八十四爻之策百九十二陽爻之策六千九百一十二百九十二隂爻之策四千六百八合之為萬一千五百二十是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣本義曰四營一分二掛三揲四歸竒也易一變也三變成爻十八變成六爻也八卦小成謂九變而成三畫也郭子和曰自八卦引伸類長為六十四卦卦合三百八十四爻萬有一千五百二十策天地之間備矣顯道神德行是故可與酬酢可與佑神矣天道有吉凶禍福問蓍得卦而能前知則幽者顯可用之應酬人事德行有出處語默聽神有告而後敢為則人者神可謂之助神行事知變化之道者其知神之所為乎吳幼清曰自大衍至能事畢言蓍變之神顯道佑神言蓍占之神凡此神之所為然變占者惟隂陽二畫而已即天地隂陽之變化也故曰知天地之數變化之道則知變占之神銑曰此九章贊聖人本天地之數作蓍而極變占之神畢天下之事也舊以五行釋變化者荒誕無稽以屈伸釋鬼神者疏謬無據且無關於生蓍之義也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占吳幼清曰言謂謀謨陳誨問辨之類辭卦爻之繇也動謂祭田昏姻征伐之類變蓍策之數也器謂創物利用象所擬物之肖似也卜筮謂叩神决疑占所斷事之可否也是以君子將有為也將有行也問焉而以言其受命也如響無有逺近幽深遂知來物非天下之至精其孰能與於此以言命蓍之辭也君子有為作內事有行作外事述其故往問吉凶蓍受命報之如響應聲逺近幽深一一告之遂知來物非至精孰能與於此精者詞之驗也故曰以言者尚其詞占在其中矣參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此參伍古語更相考核如言人之等什伯千萬也錯綜織絲者交錯去取綜提其數揲蓍之法掛一揲四歸竒者參伍也以其數為一變取第三變所得之數以定卦畫者錯綜也貫三變為一爻遂成竒偶之畫極十八變為一卦遂定肖似之象非至變孰能與於此變者多少之數不常也故曰以動者尚其變象在其中矣易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此蓍枯莖卦陳編靜則止為一物動則遂通萬變其至神如此神者妙應知來之名也夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至易有聖人之道四焉者此之謂也古注曰極未形之理故曰深適動微之㑹故曰幾朱漢上曰天下之志伏於無形非推見至隱者其能通乎易至精也天下之務來而無窮非曲得物先者其能成乎易至變也易至神也體易者不疾而速不行而至極深研幾莫知其然而然銑曰末二句重舉起語結而終之此十章合詞象變占而並贊之也夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑開物發人所未知成務全人所已行冒包裹之是故蓍之德圓而神卦之德方以智六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫崔璟曰蓍之數七七四十九象陽圓其為用也變通不定因之以知來物卦之數八八六十四象隂方其為用也爻位有分因之以藏往事注曰貢告也六爻變易以告吉凶李簡曰聖人以易道洗滌其心退藏於密歸於無思無慮密者用之源聖人用易隨取隨足在易不在心心苟留物焉能應萬變吳幼清曰吉凶民之所患聖人為氏患之以是心寓於蓍卦著之神知未至之吉凶於先卦之知藏已定之吉凶於內俾民問蓍求卦自能趨吉避凶古謂羲皇聰明睿知生知之知神武不殺喻無言之教銑曰此原聖人作易之心生萬民也是以明於天之道而察於民之故是興神物以前民用聖人以此齊戒以神明其德夫龔深甫曰剛柔變化天道之幽故明之吉凶悔吝民故之顯故察之是以興神物以盡二端之故蓍植知數龜灼知象神物也得人而後興有思則與物雜故欲洗心而齊有為則與物敵故欲防患而戒銑曰人心本虛本靈故神故明但物入為主喪其靈分其明聖人齊戒以神明其德德者心之良有即涵天道而應民故者也一元澄徹天光昭著以之問占所謂受命如響也前章厯贊聖人窮理盡性崇德廣業見作易之備萬此章特贊聖人洗心齊戒原作易之致一明道每舉此二句教人思而得之祭祀以有形感無形卜筮以有心感無心故皆曰齊戒非德積於素心合於虛於斯二者未足與議也是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神注曰凡物先藏而後出故先言坤而後言乾朱子發曰坤自夏至以一隂右行萬物從之而入故曰闔戶乾自冬至以一陽左行萬物從之而出故曰闢戶坤闔陽變而隂乾闢隂變而陽故謂之變闔者往也闢者來也其機相感不息故謂之通氣聚而有見故為象象成而有形故為器利於出入之用而蚩蚩之民咸日用之莫知其然又謂之神也七者同出而異名闔闢變通天之道利用出入民之故夫闔闢以一歲言之寒暑也以一日言之晝夜也以一身言之出入之息死生之變也銑曰禍福無門惟人所召吉凶何常觸機則易上章言聖人作易濟用此特舉乾坤闔闢有此七者以見變通者易之要道其義微其發不可禦能明乎此則於成天下之務也何難之有是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業易謂隂陽更換而為四象八卦也是易也自其未有之先言之則太極也極者屋檩以其居中而至故名蓋天地之初氣質混淪既分則清者為天為陽濁者為地為隂隂陽各有老少稚而初成者曰少久而將退者曰老乾父坤母各三索而成六子則有八卦可用之占以定吉凶俾民無所疑勇於趨事赴功故曰生大業此所謂卦之德方以知也竊詳經㫖反覆推明蓍卦之原皆則天地自宋以來言太極者謂隂陽之外别有一物立乎上以主張乎是析道器表理氣愈煩而愈支愈詳而愈踈夫自其合而言之太極也自其分而言之儀也象也卦也夫極者脊也儀者容也象者獸也卦者以物附杙也皆取於物為義氣者流形而舉質者也其合當如是而有條者理也如春秋者氣也溫與凉者理也氣之中正也溫未能勝冬而寒凉未能革夏而熱氣未充也愆伏乖戾氣之變也皆理所必然於呼天一匡廓也乃有理氣二道人一軀殼也乃有理氣二性不亦異哉生者皆太極生之而有漸次也非有三度生也是故法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉吉凶成天下之亹亹者莫大乎蓍龜法象天下為大變通四時為大懸象著明日月為大以此三者起下文苟無其位不能利天下富貴本義謂有天下履帝位是也朱升曰古初以來若鑽燧取火合土范金造字制律作厯創衣何者非備物致用立象成器以利天下乎聖人亦有不自為而任人代之者惟生蓍之備物致用畫卦之立象成器出於聖人神知之所獨也疏曰亹亹勉勉也天下萬事悉動而好生皆勉勉營為此蓍龜知其好惡得失人則棄其惡而取其善背其失而求其得是亹亹也是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之神物蓍龜也聖人則之易有占事之法變化四時也聖人效之易有九六之變日月五星之象得度吉失度凶聖人象之易有吉凶之詞河圖洛書聖人則之易畫八卦書叙九疇也洛書之叙因河圖而遂言之也夫河圖者馬背旋毛也洛書者龜背坼甲也具天地之數伏羲之取象有八卦在焉蓋總成數而定竒偶禹之取類有九疇在焉蓋因九數而次治道此甚明白先儒求之數與位多泥而難通乃肖似於金木考變於生克一為相生一為相克造化拘於支誕不得該通吁異哉此十一章贊蓍卦之功用遂贊聖人創作之㫖易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也象羲皇示人者詞吉凶周公文王所作者書不盡言言不盡意然則聖人之意其不可見乎聖人立象以盡意設卦以盡情僞繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神郭子和曰意不可以言盡故立象以盡之情僞不可偏舉也故設卦以盡之言非一句可盡也故彖爻互為之辭以盡之三者聖人作易以盡道也變通鼓舞聖人用易盡其道也變通即所謂通其變使民不倦鼓舞即所謂神而化之使民宜之也朱子發曰聖人於無形之中立有象因象得名因名得義言之不盡者盡矣情則相應僞則相違聖設卦斷以中正使人著情去僞又繫之詞以吉凶明告之與象相濟書之不盡者盡矣鼓於此舞於彼動止應節莫知其然而然乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣吳幼清曰此申言立象盡意也乾坤謂竒偶二畫上云易有四象此以四象本乎兩儀也成列謂竒偶相對易謂竒偶交互相易兩儀一易成四象四象再易成八卦緼如衣有著言根本乎此也無二體則不見相易之用易不見則此一定之體無用矣故曰或息是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業形著於上者隂陽是也迭運不已以生萬物謂之道形著於下者舟車之類是也尚象而成以生萬民謂之器剛柔六位因化裁之著其變之微剛柔相推因動成之通其變之廣以此措諸天下謂之事業夫道者事事物物各有當然之則是謂即此有之非謂别有物綱紀乎此六經四書之所同也老子憤周末之亂謂聖人所制者啓民機僞乃思上古之朴曰道别立冲虛無為之名先儒囿於其𤣥淆我聖典乃曰隂陽形而下也上有道惻隱情之發也自有性理氣之分紛紜煩復奚益於教易有聖人之道四制器其一也此舉其凡下繫詳其目安得生異說哉是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行張南軒曰象者示人以賾也爻者示人以動也寓象於卦以極天下之賾綴詞於爻以鼓天下之動聖人之於天下何其憂之深慮之切也然卦與辭載諸方册化而裁之不失其中必其通其變者乎推而行之無有紀極必其變而通者乎神而明之得之於心存乎其人默而成之悟易之理不言而信存乎德行大𫝊聖人其深慮天下後世徒泥於簡册言語而不求聖人之心者乎銑曰此十二章贊蓍卦之象詞變占歸功於聖人之作易學易之君子繫辭輯下八卦成列象在其中矣因而重之爻在中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趨時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也八卦三畫也象山澤水火之類重卦六畫也爻上下內外之等剛柔竒偶也變謂九六辭周文所繫也動謂作事吉凶悔吝人之所值天下之理動不若靜泊然無為孰為吉凶一疵不存孰為悔吝吉一而已此聖人之動常寓於不得已也畫定剛柔如木本之植本卦也蓍有變通乃隨時之適之卦也吉凶之占正主於一者勝吉則無凶凶則無吉也遂極言之天文地理正主以示人日往月來則主以示照人事之吉凶正主於一所謂貞勝也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭此言乾坤之貞觀以見卦爻所從出故曰易之緼也乾謂天坤謂地夫貞觀者天則剛健示人以易地則柔順示人以簡爻象倣此亦示人易簡而已循理而不參之僞也兆數見乎卦謂之動乎內得失驗於事謂之見乎外變而通之以盡利故曰功業辭也者各指其所之故曰情此一章承上篇之末言辭象變占也古謂伏羲止畫八卦則十三卦之象無據若謂六十四卦已重則九卦之作不協况說卦巳言六畫成卦乎意者伏羲惟有八卦卦各六畫文王乃交互重之自夬至姤共六十四也十三卦蓋推其肖象者乎尚缺考訂天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義天地合而成德生物而已又生與天地合德之聖人命之君師之位為人物之主而后能使天地之所生各遂其生也天地之大德曰生者仁也聖人成位於兩間仁而已仁者代天生萬民也財者天地所生之物以養其所生之人故聚人以財而理之道三斂聚有經費出有法邦國不得亂其制是曰理財著之話言布之典册强橫不得遂其奸是曰正辭利之所萃爭之則盜故法令以禁之得分願以安之是曰禁非理財之所宜用禁民之不宜為是之曰義所以行其仁也以下言五聖人之制作皆聚人理財之道古者庖犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情吳幼清曰氣之有文曰象形之有理曰法鳥獸動物地之宜植物庖犧觀於天地觀於動植近取逺取洞見兩間之易乃畫竒偶二畫交互成八卦而天地萬物盡矣天地開闢之後不知幾萬年洪荒朴略未有文字伏羲畫卦人文攸肇作結繩而為罔罟以佃以漁蓋取諸離吳幼清曰以散絲散麻紏緊而合曰結罔取獸曰佃罟取魚曰漁蓋不敢决定之詞人無爪牙不敢敵獸之猛羲皇以前獸每食人人既有罔罟取魚獸食之免為獸所食大哉聖人之仁乎子夏傳曰罔罟內虛而外堅維之離之象魚獸麗之而不脫强能麗强離之義銑曰罔罟至於書契所謂尚象制器也包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益子夏傳曰人育而繁腥毛不足結其食修易其變相五穀之種可食者修而藝之其在於器乎吳曰斫削而鋭之耜耒首揉揉而曲之耒耜柄益之上巽二陽耒之自地上而入下震一陽耜之在地下而動日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑子夏傳曰古人質而自守其居不相往來財貨有餘不足不知其均也故為之市日中者明也萬物皆相見而不相昧動於明之象神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久黃帝堯舜垂衣裳而天下治蓋取諸乾坤艱鮮並奏市易又興民稍異於禽獸矣而制度未備風氣漸開不可如朴略之世此窮而當變也黃帝堯舜教民始於有君臣上下而后禮義有措衣上裳下乾尊坤卑也君臣之義明上下之分定故天下治吳幼清曰乾竒象衣之合一坤偶象裳之殊二朱子發曰神農時與民並耕而食至是君逸臣勞乾坤無為六子代事王介甫曰執久則釋視久則瞬事久則弊不更則斁故通其變者使民不倦而已因其所利變而不見其迹使民宜之而已刳木為舟剡木為楫舟楫之利以濟不通蓋取諸渙空木之中為舟以浮水削木之端為楫以運舟水阻其道舟楫通之免沉溺之災木在上水在下巽又為風行水上皆渙之象服牛乘馬引重致逺以利天下蓋取諸隨軛加牛項使引重載衡加馬背使致逺道取象之義缺重門擊柝以待暴客蓋取諸豫吳幼清曰柝警盜器豫前二偶畫重門之象九四一竒畫而動體擊柝之象下坤三偶民安居無暴客之象斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過纂圖曰艮石止震木動臼杵之象胡翼之曰聖人既教人粒食又教精治其五榖是小有過為其事也弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽龔深甫曰弧矢之用相睽不可相無卒所以治暌猶火動上而澤下動也上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯穴居窟室則無棟宇之壯野處橧巢則有風雨之侵外垣四周曰宫戶牖之內曰室棟檩也宇椽也取象之義缺古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過以薪承藉其下而置尸焉復以薪覆之不封無墳不樹無識哀盡則止也取象之義缺上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬說者曰民淳事簡結繩為信書以刀筆畫木簡為文字也契以木刻一二三四之畫而中分之各執其一合之為信也契但記數書則有指事象形之變吳幼清曰書契始於一至五而變夬亦至五而上為偶也韓退之曰如古之無聖人人之類滅久矣吾今與汝安居而暇食優遊以生死與禽獸異者可不知其所自耶銑曰尚象制器必其形製之肖其不可推者寧缺之先儒拘泥者既非而直以義訓者又不協也是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也自庖羲罔罟至作書契言制作之詳而結之曰易卦者器物之象聖人之作與之合也因象以及辭使人趨吉避凶象之器詞之占皆仁民之道焉此二章言制器之事與詞變占為四而易廣矣盡矣陽卦多隂隂卦多陽其故何也陽卦竒隂卦偶其德行何也陽一君而二民君子之道也隂二君而一民小人之道也張子曰一其歸者君子之道多其御者小人之理震坎艮皆一陽二隂巽離兑皆一隂二陽乾坤其易之門耶乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪此言六子自乾坤而生故曰門隂陽合德氣相交也剛柔有體所生之物有形也震坎艮一剛二柔巽離兑一柔二剛是體也天地水火雷風山澤天地之撰健順動入陷麗止說神明之德又言六十四卦自八卦而生重卦之名不一而不過八卦考其類猶曰論其世也蓋聖人監於二代而作時有隆汙道有升降世既下衰不如是不足以盡天下之情僞也夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隱因貳以濟民行以明失得之報吳幼清曰彰往者明於天之道陳已往之理察來者察於民之故知未來之事以人事之顯本之天道所以微之也以天道之幽用之人事所以闡之也開釋名卦之意而各當其名辨别隂陽之物而正言其占凡此者文王斷以彖辭則備矣李簡集說曰稱名小取類大託象以明義因小以喻大也㫖遠推索而無窮盡辭文假托而不質直曲而中隨物委迤各得其理肆而隱發物縱橫各緼其微因二以濟民行者因其疑慮不决恐懼易入之時以濟民行告之吉凶悔吝之詞知如此為得而行之報以吉如此為失而行之報以凶銑曰此三章贊文王之彖也易之興也其於中古乎作易者其有憂患乎不曰述而曰作蓋重卦之名前所未有也文王在羑里而作憂患者為天下後世不得與聞易道也在岐周之時敷德行仁救如燬之民無暇著書被幽無事立言垂教若聖人之自處樂天知命豈藉此以自遣乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也聖人於易揭此九卦指示後人全體大用之學說者見上憂患二字遂以為處是之道豈其然基所以立也非禮不立柄所以持也惟謙可執人性本善故曰復德久斯固故曰恆損其害則德自修益而進則德有餘困則學也明而不蔽井猶性也安而不移巽於理故能制乎變初陳九卦之名取字義也履和而至謙尊而光復小而便於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱禮用和而行之至不失中也謙尊人而已則光必受益也復陽方微而不雜於隂物也恆動雖雜而不厭其入損己之欲難習熟則易益己之德裕撰造則僞困險而說身困心亨井上乎水泉洌施溥巽稱物之宜然心之權度非可見再陳九卦之名取其德也履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權行貴乎達和無乖忤矣禮本乎讓謙其儀則矣復於善乃反於心德惟一不徇於物懲忿窒欲是曰遠害改過遷善是曰興利上不怨天下不尤人是曰寡內能存己外不絶物是曰辨行者不定於一所權者不係為一物前却遊移以等物之輕重而取衡之平時中是也聖人之大用故以是終焉三陳九卦之名兼上二義而施之用也此四章易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要惟變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行集說曰不可逺言其書之利於民用不可逺也屢遷言其換易不一定也六虛謂六位虛其位以待變動也爻或往而居上或來而居下或以剛易柔以柔易剛不可為典要惟變是從而已然其出入往來皆有法度非妄動也卦之內外皆足使人知懼外焉懼其失於有行內焉懼其失於修身又明於憂患之道與其致之之故則有事而占之後雖無師保之嚴如父母之臨言易之書使人愛敬如天性也人於用易之始循易書之辭揆其處事之方其道盡有常法不可變易也苟非其人學易用易之君子也銑曰不可為典要卦之變也既有典常書之詞也卦之變無定體書之詞有定理學易者由詞以明理即理而應變錯綜斟酌天下可運於掌此五章贊卦變及聖人以易為教也易之為書也原始要終以為質也六爻相雜惟其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖詞則思過半矣易之為書原究其事之始要截其事之終以為體六爻分列剛柔相雜者惟天下時與物不齊故以此效之也初者事微而禍福未定其辭多擬議如木之本在下故難知上者事彰而禍福已判其辭多决定如木之末在上故易知此論初上二爻也若夫雜物或陽居隂或隂居陽撰德或以中以正或過與不及明是二者之是非則非中爻不備非初上所能該此論二三四五之爻也又歎學者要考隂陽消息之存亡事情得失之吉凶則可坐而知矣通上六爻也知者見於未形但觀彖辭明一卦之材及其大義則十得其四五不待畢六爻之文也二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶此論中四爻也自漢以來解為互體此後人因易致占然耳易無是言也蓋初本而擬之難知上未而終之易知二爻煥然矣中四爻功位未明故再陳之二四隂也三五陽也功同位異也二多譽中也四多懼近君也逺者意氣舒展故譽近者勢分逼迫故懼柔之為道不利逺者二何乃多譽乎其用柔中故也雖終上令不為事首雖行己志不涉權疑也三多凶五多功五貴三賤其等不同也三賤而失中五貴而得中非謂柔危而剛勝耶三處下位之極其柔居之則危不勝任其剛居之將以為勝耶有時乎過剛矣危則顛疾過則易敗此三所以多凶也五則不然以剛居之則大中得位以上馭下之權以柔居之則處謙執虛以貴下賤之美此五所以多功也多者謂不盡然而如此者衆爾此六章專贊六爻之用易之為書也廣大悉備有天道焉有地道焉有人道焉兼三才而兩之故六六者非它也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉三畫之卦象三才也一而已則獨而無對天獨陽而無隂地獨柔而無剛人道混而不明必兼而兩之則天之隂陽地之剛柔人之仁義備矣此卦之所以六畫也一無變動兩之則有故曰爻言效天下之動也爻有上下貴賤之等故曰物物有九六錯居剛柔之位則成文錯居當者吉生焉不當者凶生焉此七章贊六爻本三才而作也鄭氏曰隂斂其質陽散其文天道也靜翕以柔動闢以剛地道也以仁立人以義立我人道也天辟乎上而統元氣人位乎中而統元識地辟乎下而統元形此之謂材易之興也其當殷之末世周之盛德耶當文王與紂之事耶是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能說諸心能研諸慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能商衰周盛此正消長之際聖人率叛事上蓋修臣禮故易之辭危而不敢安夫視以為危而懼之可使安平視以為泰而易之可使顛覆使者理有必至若或使之也易極大而致微使人有危懼終始此心其歸於無咎爾此言懼之一字學易之要道也夫易者乾坤而已乾謂天坤謂地天之至健以易而知險兩險相疑不知其險易者知之地之至順以簡而知阻兩阻相持不知其阻簡者知之天地有險與阻况於人乎安其危者利其亡也人於易簡之德居則玩而得之心動則研而精其慮可以定吉凶成亹亹矣吉凶之有先非猝至者故變化不一人之言行吉事必有祥祥者福之兆也故象事知器象為器景占事知來占先事見人事不能先易也天地具此道聖人作易教人由之是成天地之能既以虛謀之人又以筮謀之鬼吉凶皎然可趨可避是百姓亦及聖人之能也此言險阻即危者也處以易簡知之用易終之以懼可以無咎矣下文遂陳卦爻命辭之法學者玩而知占占而可用也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情僞相感而利害生凡易之情近而不相得則凶或害之悔且吝八卦以象告者剛柔雜居而吉凶可見當位則吉不當凶也爻彖以情言者言彖因變成卦專言其利如柔來文剛之類雖睽蹇明夷皆言所利也若據逐爻之情裁事則以情遷吉凶異於彖故在彖為卦主而在爻反凶蓋逐爻之情有愛惡有逺近有情僞有得否而值者異其占項平父曰以六爻吉凶悔吝利害之三辭分其出於相攻相取相感之三情總屬於相近之一情故象其情而命辭則觀其辭而知情利害者商略其事宜而相感者情之始交也悔吝有迹而相取者涉於事也吉凶者兆之成而相攻者其事極也此姑就淺深别之凡情莫不然故總以相近一條明之不相得者惡相攻僞相感近不相取也銑曰近謂比爻也逺謂應爻也卦又有主爻如比之五比者吉違者凶豫之四貞者吉宗者吝觀此數言則聖人作易命辭盡情僞以示趨向開物成務立我生民彼拘於象數定為占卜曰得聖人之本㫖均未通也將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈上言爻之命辭由情而生故以人情之辭譬之真希元曰人將為亂必有愧於中故其辭慚見理不明中心眩惑故其辭枝支離而多端也端良之人言不苟故寡狂躁之人言必輕故多誣善者中懷羞恧故其辭遊揚不確失其守者奪於利害故其辭卑屈不伸有諸中必形諸外也故聖人曰不知言無以知人銑曰此八章通贊卦爻辭之㫖也讀易餘言卷四
