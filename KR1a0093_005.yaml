body:
  text: 讀易餘言卷五明崔銑撰說卦訓繫辭曰昔者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情繫辭發其凡說卦詳其目宋陳圖南方外竒踪不關日用所傳圖象皆衍術數與易無干伊川康節同里久矣無一言及之程子豈無真見耶朱晦菴取圖冠易然實無所用之今止宗聖經本之繫辭粗加訓釋而他皆不取也昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命此贊伏羲作易之原也易者何蓍也數也卦也爻也何以生蓍幽贊神明也蓍者五十策也蓍龜聖人立占筮之名非指在地之草聖人肇為蓍法代神明詔人以吉凶贊其幽而使靈之顯也何以有數參天兩地也積天之生數一也三也五也不曰九乎陽之變依之積地之生數二也四也不曰六乎隂之變依之何以立卦觀變於隂陽也謂竒偶二畫竒則實偶則虛何以生爻發揮於剛柔也謂卦之六位蓋隂陽者氣也剛柔者氣聚而有體也乾坤隂陽之純否泰隂陽之交彖傳言隂陽餘皆言剛柔各得之一體也和順於道德者卦之槩如乾剛坤柔之類理於義者爻之詳如自初至上時位不同處之異道此所行之利於民者也窮物之理盡己之性合流行之命而一之矣此所知之明於天者也變者言其運用非自蓍言發揚揮布也謂成六位章而明也說卦聖人皆指庖犧一人也昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章此贊聖人作卦之義也性謂人禀賦之道即下文仁義是也命謂天地流行之道即下文隂陽剛柔是也天地人之道無獨有對故天之氣有明而陽幽而隂者地之質有强而剛耎而柔者人之德有愛而仁斷而義者兼三才者一之也不二則無體而兩之者配之也不兩則無用故易六畫而成卦象天地人各有兩而為六也分隂分陽言六位位無質故以隂陽名之迭用柔剛言六畫畫有質故以剛柔名之位者初至上也畫者九六也六位之隂陽一定六畫之剛柔無定或剛上柔下或柔上剛下相錯而成文此所謂順性命之理也說卦贊庖犧之易而曰六畫而成卦則已有重卦之證也而非出於文王明矣天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也聖人兼三才以兩成卦自天地定位至既成萬物則言造化各以兩而為用聖人立卦圖造化而已天地定位在上在下也山澤通氣山虛澤潤也雷者陽欲出風者陽欲入相薄也水濕火然相克相濟也相錯猶曰錯行謂各出而交互也順者言已然逆者言未然易以知來故曰逆數也宋以來儒者謂此為先天圖下數章為後天圖先天者夫子贊易之言謂先創此制天不能違如厯之弦望卜之吉凶是也即如𤣥虛之論則謂一氣之先未有一物之名今天地山澤形之博大水火雷風變之紛蕩義殊不類蓋此數章即所謂神明之德萬物之情聖人仰觀俯察得之夫子縷陳之以備易道焉雷以動之動其氣而胎萌風以散之解其結雨以潤之滋其形日以烜之暖而長艮以止之形有定兌以說之含其性乾以君之知大始坤以藏之作成物乾坤者體也六子者用也帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聼天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兑戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮蔡伯靜曰帝之出入不可見而可驗於物銑曰出而物生生而齊畢出也離明而形見坤養而物成成則保和而說皆結實矣遇凋落之候盛隂殘陽相爭坎則歸根而復艮則息氣而萌生成者物也生之成之者八卦也主之者帝也帝者一元之氣也楊廷秀曰艮東北也北為冬物所終而止東為春物復始而動動而止止而動物莫窮其用始而終終而始物莫知其紀大哉造化之仁乎神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤莫物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也帝者言其宰物者也神者言其妙物者也帝者一元之樞神者一元之英宰則包萬物無遺妙則運萬物不滯六子之成無限帝也六子之用無迹神也其乾坤之尊稱與非有二物也朱子發曰六子不能獨化故必相逮也不相悖也通氣也然後能既成萬物程可久曰始言六子之材各有所長終言六子之情各有所合銑曰此所謂一隂一陽之謂道也前以八卦並言之上章合八卦而首曰帝此章舉六子而統於神其表異造化之盛德與或者繪此為圖名曰後天又曰莫盛乎艮以上為文王之卦之位故水火相逮以下為伏羲之卦之位先天對待後天流行嗟乎一造化也至二圖而列為異體且一章之內首尾橫决本末舛逆蕪穢聖言極於此夫先天方圓圖方士假易之卦為火之候未有以解易者傳之自陳邵始邵子經世土石風雨之配與易相反蓋自為一學天地定位以下則後人因易之文圖之爾發萌殷蟄動吹拂長飬撓炎赫爆炙燥精實肥滑說滋液歸根潤乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也八卦之德六子各以所索一爻言之乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊乾為首坤為腹震為足異為股坎為耳離為目艮為手兑為口在上首有容腹陽下動足隂兩岐股收聲耳散明目止物在手上折口繫辭曰遠取諸物近取諸身餘見廣象乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女索求也自坤求陽皆男自乾求隂皆女即所謂卦變也夫聖人判隂陽為八卦以八卦括人道立德者去陂適中前用者避凶趨吉人道立於仁義天地統於乾坤而宋元諸儒卦變之訓破裂造化支散聖經今一無取焉乾純健天體動圜主萬物君知大始父德粹玉純剛金西北寒寒水氷盛陽色赤純陽健久良老瘠極而變駁圓在上木果坤積隂地作成物母柔而廣平布虛容物釡靜翕吝嗇動闢廣均性順牛牝牛乳子子母相隨厚載大輿坤偶畫文衆承物柄極隂色黑震陽動雷動奮之物在重隂下龍乾坤始交色兼𤣥黃陽始布敷一竒二偶開通大塗一索長子陽進為决躁蒼震色蒼筤竹下實上虛萑葦氣始亨善鳴陽動於下馵足馬懸足也在下健作足隂白色在上的顙凡稼生意從種中出著地為根然後乃萌芽上出成苖反生或曰剛反動于下陽長終乾健蕃鮮巽幹陽根隂木善入風一索長女以柔正剛繩直工少隂白木長髙風行長隂伏進退不果隂氣鬱臭陽盛隂伏寡髮二陽在上廣顙眼白為陽黑為隂離目黑在中巽上陽多多白眼隂在內善入近利市三倍三變震躁坎二隂凹之象一陽象水流凹中水溝瀆陽匿隱伏隂制陽矯輮弓輪陽陷加憂心耳體虛坎中實病痛坎為血得乾中畫赤脊外體之中得陽美心內藏之中得陽亟上畫柔下首下畫柔蹄薄曳多眚水之性通水之精月陽匿隂中盜剛中堅多心離明火日電再索中女甲胄外堅乾畫戈兵上鋭離性中虛大腹火槁燥外剛內柔鱉蟹螺蚌龜中虛外乾科上槁艮一陽出隂上而高山一陽橫亘徑路小而剛在土上石上畫連亘下二畫雙峙而虛闕小而實果蓏止閽寺手止物在指內剛止物狗前剛鼠黔喙之屬剛上堅多節兌澤水之聚二陽下沉一隂上見坎壅成澤兑决成川三索少女兑上折巫口舌前畫缺毁折柔附剛剛决柔附决下陽堅硬上隂鹵濕鹵水之死氣凝而不流成之少女從姊妾內狠外說羊右廣象晉江蔡清采舊訓之精者今更刪潤簡明易廣矣大矣百物不廢先聖有作莫非精義序卦有程𫝊雜卦本文自明吳幼清以卦主釋之詳具本書讀易餘言卷五
