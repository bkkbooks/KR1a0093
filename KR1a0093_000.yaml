body:
  text: 讀易餘言原序銑童丱居陜聞蜀蘇氏茂之講易心樂之先君子亦篤好是經采長明訓咸出手録及壯仕于京會友繹習官為翰林得閲祕書至今五十年銑齒六十有三憂喜夷險履行處運亡一日而不體夫易也先儒解什詳矣繁矣好竒者求義於象流為詭誕飛伏內甲五行互體以彼小術蕪我聖典夫皇羲畫卦文王周公係詞夫子作翼一也謂易道加詳可爾乃曰有羲易有文易有孔易支矣哉易有聖人之道四今尚象者亡其裁尚占者失其法因夫子之贊明三聖之旨以貞夫變以正其履傳是者倡於王弼備於程子斯時之宜也易之要也爰述管見于篇以暢二氏之疑者云嘉靖庚子冬十一月庚子洹野崔銑序欽定四庫全書經部一讀易餘言易類提要臣等謹案讀易餘言五卷明崔銑撰銑字仲鳬一字子鍾安陽人𢎞治乙丑進士官至南京禮部侍郎諡文敬事迹具明史儒林傳是書以程傳為主而兼采王弼吳澄之説與朱子本義頗有異同大旨舍象數而闡理故謂陳摶所傳圖象皆衍術數與易無干諸儒卦變之説亦支離無取其上經卦略下經卦略大象説皆但標卦名不載經文繫辭輯説卦訓則備録傳文蓋書非一時之所著故體例偶殊且經有卦名而繫辭説卦無章名其勢亦不能不異也惟刪説卦廣象八章而别以蔡清之説增損之又集卦雜卦文言三傳一概從刪則未免改經之嫌也要其篤實近理固不失為洛閩之傳朱彞尊經義考載銑讀易餘言五卷又載銑易大象説一卷考此書第三卷即大象説彝尊以其别本單行遂析為二偶未考也今附著於此不更復出焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
