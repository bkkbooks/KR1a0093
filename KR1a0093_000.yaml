body:
  text: 讀易餘言原序銑童丱居陜聞蜀蘇氏茂之講易心樂之先君子亦篤好是經采長明訓咸出手録及壯仕于京會友繹習官為翰林得閲秘書至今五十年銑齒六十有三憂喜夷險履行處運亡一日而不體夫易也先儒解什詳矣繁矣好竒者求義於𧰼流為詭誕飛伏内甲五行互體以彼小術蕪我聖典夫皇羲畫卦文王周公係詞夫子作翼一也謂易道加詳可爾乃曰有羲易有文易有孔易支矣哉易有聖人之道四今尚𧰼者亡其裁尚占者失其法因夫子之贊明三聖之㫖以貞夫變以正其履𫝊是者倡於王弼備於程子斯時之宜也易之要也爰述管見于篇以暢二氏之疑者云嘉靖庚子冬十一月庚子洹野崔銑序欽定四庫全書經部一讀易餘言易𩔖提要臣等謹案讀易餘言五巻明崔銑撰銑字仲鳬一字子鍾安陽人𢎞治乙丑進士官至南京禮部侍郎諡文敬事蹟具明史儒林𫝊是書以程𫝊為主而兼采王弼呉澄之説與朱子本義頗有異同大㫖舎象數而闡理故謂陳摶所傳圖象皆衍術數與易無干諸儒卦變之説亦支離無取其上經卦畧下經卦畧大象説皆但標卦名不載經文繫辭輯說卦訓則備録傳文盖書非一時之所著故體例偶殊且經有卦名而繫辭說卦無章名其勢亦不能不異也惟刪說卦廣𧰼八章而别以蔡清之説増損之又集卦襍卦文言三傳一概從刪則未免改經之嫌也要其篤實近理固不失為洛閩之𫝊朱彞尊經義考載銑讀易餘言五巻又載銑易大象說一卷考此書第三卷即大𧰼說彝尊以其别本單行遂析為二偶未考也今附著於此不更複出焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
