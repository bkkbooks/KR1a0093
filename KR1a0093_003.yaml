body:
  text: 讀易餘言卷三明崔銑撰大象説乾八卦之象廣矣聖人舉其大者乾陽之大坤隂之大六子皆然天行以氣言古渾天云天如鷄卵地在天中如卵中之黄二十八宿繞而轉地之四圍上下皆虚空虚空即天也天何以有行即其宿而言之耳象用以字即君子之用易也自强不息一人之身天行健也天晝夜行九十餘萬里人一呼一吸為一息晝夜凡一萬三千五百息人一息天行八十餘里夫氣固有天矣何莫勱斯徳也坤地勢以形言上坤下坤一髙一下勢積而厚焉地之積也不厚則載物不勝其重而墜君子之徳也不厚則載物不勝其重而遺屯陽蒸隂則隂氣騰而為雲隂鬱陽則陽氣奮而為雷二氣交和則雨屯者雷動於雲中而未雨二氣尚滯且世何以有屯葢因彼此情結而志離君子緻謀締慮往而亨之如治絲然觧其結如理其緒聚其渙如比其𩔖觧法雷之振聚法雲之合其道伊何曰物有主則定國主於侯人主於心蒙泉方出山而未達如人方在穉而莫適也行言事也怠則隳徳言心也棘則害泉達流於海雖折必東果行者取之𤼵源於山所涵則䆳育徳者取之一曰初出之泉濳伏未見亡所汚滑未𤼵之蒙蘊畜在内亡所誘化必行有漸泉之達果行育徳蒙之亨徳者行之自出行者徳之所形需水氣升而為雲上於天雖未雨而雨可待也君子飲食燕樂時未亨而亨可須也君子豈必醉飽鮮濃單食瓢飲之樂皆然他無一為安以待之爾夫需豈易能哉世之遭間阻進者百爾求通終焉致敗幸險為途固無足咎謀人國家抑又甚焉出竒策變機士也尋幾曲就知士也夬而忘身義士也死而如歸勇士也一致反噬君與受之於乎可不慎乎訟天上水下勢自不接而違訟之象也人之情不相合則睽訟之由也故曰天與水違行葢訟起於負剛好先者作事謀始俾具不違而已人之争二曰是非也利害也天下有公是公非合理之謂公事勢有當利當害協義之謂當惟理之明不必非在人而是在我惟義之安不必利可就而害可避理也義也心之所同然也君子之謀始有道矣師地中之濕者皆水田中之耕者皆兵水行乎地兵隱於農故取為象容之者居之也比閭族黨州鄉之列則如坤之受水畜之者聚之也田廬穀粟桑麻之利則如坎之有防王者以道得民以寛御下平日周撫字之恩有動得敵愾之報否則傷民之力環國皆仇讎安得而用之比地上有水非澤所鍾散而㑹川各有所比先王象之建萬國使各子其民親諸侯使咸歸於一公侯伯男封疆有限建之也朝聘往來恩禮亡間親之也夫上下亡分强弱不齊則大凌小衆暴寡趨於亂而蹙其生於是强有徳者出焉然後大小之勢分衆寡之情一小事大大字小葢先王封建之善也唐虞萬國衆建而少其力則多助而易制周之國千有八百夫子繫易其逺慕先王之盛而嘅周末之併與小畜天非有上也以人目力所及言之風有氣而無質况行之空中但能卷浮雲止飛鳥春秋所書六鷁退飛過宋都𫝊謂風也是其證也懿柔粹之小徳也以懿文其徳則和氣令詞愉色婉容皆全徳之輔固不若多識前言往行啓發培灌之饒也履凡履地而行足動而地止天運澤上澤瀦不流故為履君子辨上下以定民志民志何以不定由上下未辨也貴賤不殊尊卑亡别旣可相凌遂欲相僣夫上者如天之不可為澤下者如澤之不可為天見其勢懸絶已其心妄幸程傳至矣考諸近世賦重刑煩農匱商消越限獵級惟士為然庠序慕榮利朝廷尚躁競亦上下之未辨與夫舉士以行考實以功掄才以職序賢以位一核執於上萬妄息於下矣泰天氣下降地氣上騰曰泰后乗景運裁成輔相非為天地俾民因天時乗地利養其生而安其業乃左右民也斯后致世之泰焉銑伏讀卦象而三才可重矣故有天地而亡后人而禽木也有后而亡天地后亦枯槁也天生之地成之后用之然天回開治之運后有善道之功天發淳朴之氣世多敦厖之民天地否而萬物塞聖人其奈何豈但臣難遇君而后亦頼天也與裁成輔相舊觧多言養銑謂天地生萬民后列其彛倫天地生五材后制其器用亦是也否天氣不降地氣不升曰否猶君臣之無交儉徳辟難不可榮以禄乃君子之處否也其徳既歛其名不聞人亡能知其賢而禄之夫徳之見者名之著也名之著者禄之及也禄之及者害之臨也小人道長之時禄則與之同事彼能容君子之貞乎儉徳坤之嗇也不可禄天之髙也同人天運上火炎上故曰同人君子𩔖族辨物母乃乖於同之義乎葢物生雖同其類各殊其類雖同為品又别不别其異亡以為同雜鍮與鏐而均謂之金雜玞與瑜而均謂之玊非但金玉失其真而玦與鍮亦亡用矣夫族有髙下類之則髙與髙同下與下同物有大小辨之則大與大同小與小同處不失方用各適宜矣兼之者法天之量辨之者法離之明大有大象明以日言葢日君象也明則人可體行火則指氣為類有二已麗於物其焰光明有體之火也未麗於物其氣溫暖亡體之火也暖氣冬潜地中子月漸升夏見於天上午月則極盛矣故曰大有厯家星火考夏晝漏最多天星大火時盛事煩善惡生無不章别之則善者屈而不伸君子遏人之惡使不復為揚人之善使益勤修以順天命非其私意天命有善亡惡故爾一以法離之明一以法天之道也謙地中有山與水猶人身中有骨與血若地下則虚空也山各有脉如水各有源其形起於地上其根發於地中觀天下之勢最下而負海者多山地中有山何疑焉大象皆實體所謂仰觀俯察取物象宜者非寓言也君子裒多者以益寡者分人之財不以自殖教人以善不以自賢乃稱量物之宜平其施不見我之髙而彼之卑也上句象山在地中下句象山與地平豫陽消而始生雷在地中陽長而日盛雷出地上遏欝之乆奮而出聲至通而暢和豫之象也内順外動和積中而發於外樂之原也先王作一代之樂發揚祖考之徳而崇大之盛其享禮以配上帝幽明人鬼訢合無間説者曰雷發聲於仲春收聲於仲秋故禘有樂而嘗亡樂固哉斯言春生物作樂以樂其來秋死物致哀以哀其往宋人謂春月樂秋月悲葢舒惨自然之理焉隨朱升曰雷陽薄於隂所為龍陽氣之聚静則潜伏動則衝破隂氣而有聲即雷也此説於象為近舊傳収聲於兑乃言其時也太室有龍潭笑語黷神龍龍怒則有雷韓退之㳺而遇之見題名龍之雷隨澤而静故曰隨君子嚮晦宴息如雷在澤也夫人之夜天之冬也冬雷則災冬暖則厲葢造化不息則歛不凝固妖沴乘之故三才之理一動一静静所以養動之根也日入而息人事至㣲者上法天運道不可須臾離信哉雷隨澤静人隨夜息蠱吳氏謂山腹有冷急之氣則山枯而崩故曰蠱銑嘗述之然理則未然夫風者動機也驅水氣至則寒凉驅火氣至則溫暖風烏有寒暖哉凡物動則有成壊山以静為體山下有風山之體動而摇矣故曰蠱動之不善者也君子振民育徳者民心偷墮風俗澆薄振而起之使治其生業修其孝弟忠信則民徳歸厚矣此動之善者也所以治蠱也風之鼓外物振民也山之涵内氣育徳也凡物遭風吹乆則必壊置之則遂朽治之則更新臨臨古訓監也謂監守也陽在上者也而履於初之下隂在外者也而依於二之中若有所監守然澤上之地岸也岸下臨乎澤故曰臨言其切近也君子臨民以徳教容保之而已容者萃之也保者安之也然非勞來匡翼從而振徳何從而永奠哉教思無窮者如澤之漸入地中終古不涸容保无疆者如地之周於澤外涓流不洩五行生克本出緯書揣測小騐諸儒采以言易夫子十翼惟水火為重兑為澤不曰金震為雷不曰木夫小道豈無可觀然惑世罔事其害隨之况又以亂大聖之典乎觀乎聲風行地上卑而及物所加者偃所觸者動故取逰厯周覧之象為觀先王廵省四方乃觀民俗為之設教葢國有異政則民有異俗竒衺淳龎相為進退王制太師陳詩以觀民風令市納賈以觀民之好惡修其教齊其政不易其俗是也如是則天下化中矣省風象風之行地觀民象風之吹萬設敎象風之因竅而鳴噬嗑電煜於上雷震於下物之梗於兩間者皆消噬嗑之象也先王取明威兼用之義明辨按罪所贖之罰使民懲過不疑於所坐檢敇平日所定之法使民畏法不犯於有司堯典曰金作贖刑罰也象以典刑法也問曰噬嗑與豐之象何以異曰豐明在先故致刑噬嗑動在先故明敇而已賁山腹之内有溫暖之氣則土脉鮮潤草木華暢所以賁乎山也君子以明庶政法度典章粲乎有文无敢折獄葢貴情實而忌文飾夫獄之難聼乆矣五疵已去三徳已全明清單詞審克兩造指顧之間存亡攸分猶有原情固慝失於出入者漢宣管仲幾陷於死若恃其明察深文巧詆縁餙以成要小人則敢君子則无敢夫一刑也夫子五致意於大象葢疾法網之苛文吏之奸歎民之多艱也夫先之以臨觀教養也次之以噬賁刑罰也刑以弼教之不逮也是故政有叙矣豐明而動故致刑賁明而止故无敢一於止則奸何懲而善何伸一於動則刑日煩而民日玩然无敢者審之詳而發之重也非不聼也氣暖於内而賁於外政發於心而明於民剥山之下趾杇蝕消圯則上頂傾陷而下附於地故曰剥上以厚下安宅葢君居民上如山盤地上山以地為基君以民為本厚其地則山保其髙厚其民則君安其宅夫民以戴君亦以叛君得之如菑田以飽腹失之如反裘而負薪於乎難之哉夫卦有吉凶大象皆善葢天下所有之理君子皆體之卦雖凶而理可通於吉則取之剥與明夷是也古云不善人善人之資况造化之實體邪復復反也有四義行者歸離者聚過者更喪者得也復不曰陽而曰雷葢陽出地為雷至冬陽消不雷矣子月陽生地中而長春之震擊即此一陽之還者故曰復先王於冬至一日之間閉四郊之闗下而商旅上而后王皆禁出入如雷在地中且以養微陽也夫坤十月之卦必至冬至之前坤隂方至上而足復十一月之卦必交冬至之後復陽方自下而生日陽之宗也沒西而後生東盡晦而後交朔積之一月元齊履謙辨其不然夫隂陽消長言化機之用與藏猶人之寤寐也陽極而降降極而升隂伏而升升極又降皆厯六月而成亦非今日為隂而明日頓然為陽猶人倦已而寐睡熟而寤耳豈真若穀粟然根蒂脱落乃復種而芽芽而榦哉一氣發則一氣㡭此氣伸則彼氣縮隂陽消長進退似不過此宰之者其太極乎无妄无妄者誠也天以誠動物以誠應非强而然窮冬寒沍生意閼塞初春一臨物萌芽矣氣尚鬱而生尚屯也驚蟄之月雷霆一振以聲動萬物之氣由是欎者達屯者伸翼者動而飛足者動而走生者動而滋植者動而榮時至而皆化氣氣化而各成能故曰物與无妄言莫匪自然也聖人對時育物豈能有所先後而加損之法乎天而已大畜據渾天之説凡地之上虚空皆天也故曰天在山中山惟畜天故貯氣濃厚殖産特盛中庸謂草木生焉寳藏興焉是也君子多識前言往行以畜其徳故大業成焉爾夫山本天中之物故氣與合一而成大畜前言往行乃先得我心之同然者也孤聞淺識不足以議道而盡變故貴乎多君子考之於彼協之於一摭其華必茹其實采其質必寘諸用始也由見聞而得終也并見聞而化如蜂之掇花而蜜如身之飫食而肥後人雕繢組織以為工隱嘖竒雜以為博黠者矯之曰六經注脚讀書糟粕銑伏讀聖言竊嘆學之失傳也頥人之頥上止下動艮止于上震動于下之象也山以形雷以氣程傳以明其山之生物動其根荄云云又若言其義者後人遂迂曲求之乃取諸雷洞亦過矣頥上取義故以切近者曰言語飲食也此象震之動慎節象艮之止大過澤水潤養其木者木髙而澤卑也今溢漲而浸沒其木不亦過甚矣乎君子負大過人之才乃隱側陋而屈下僚然節行不折其居此時也或進必大有為反本末之弱獨立不懼也或退必貞自守樂道義之羙遯世无悶也木在水中特而不欹獨立者取之水過木杪没而不露无悶者以之君子復善而誠資善而徳可謂有養矣故抱大過之才而成大過之事序卦曰頥者養也不養不可以動故受之以大過坎相續曰洊水之流也前者徃而東去後者又從而西來兩坎之象也始終如一之謂常徳行有常則處暗如顯勤小如巨一再不已之謂習敎事能習則困而學者如生知利而勉者如安行彖所謂不失其信者與或曰坎北方之卦積隂肅殺之氣坎險也難也兵凶器戰危事故坎為兵戈之象詩序有常徳以立武事月令仲春教振旅仲秋敎治兵銑伏讀夫子之書曰以不敎民戰是謂棄之用武而以文敎古之道也大象五言刑夫兵刑所以治天下之間大則兵小則刑不應畧之或者之言可存離日出曰明没曰昏作起也發也明作猶言明發兩猶再也日一而已旦旦明作見重離之象大人以徳言繼明者猶言緝熈也故能徧照四方不然耳目所及且蔽之况萬里之逺哉程傳稱先王者所以立法制建國作樂省方勑法閉闗育物享帝是也稱后者王之所行財成施命是也君子上下之通稱大人王公之通稱咸山上何為而有澤謂山之虚也澤氣上蒸于山而山受之人心惟虚方能受人葢心有私主物又窒之自滿自足事將衝决家語云損其自多以虚受之故能成其博也難曰感不以正亦將受之乎曰彖曰利貞葢善惡從違在其中矣長善而抑惡背非而從是悉有以通之斯之謂貞否則以量而容擇合而受程子固小之矣恒雷震則風發二者常相從而不厭故曰恒或曰雷出而上風入而下夫雷風相遇於天地間上下安有常又曰雷迅則風烈風飛則雷厲此侵益之象故惟程子一句盡之君子立不易方方謂事情所向君子立有定向而不妄動也咸之彖言感象則言受恒之彖言乆象則言定易變无窮一曲之見難與共學隨方之所在而立非止一方也遯山止而天運天若遯去邈乎不相及也君子之逺小人豈必壯于頄悻於色疾之已甚惟在我非法不道非禮不履則小人逺何者其道不同其交自疎其徳既髙其心自服其迹既峻其狎自止故不惡者待彼之禮嚴者守已之節夫天下有山遥望之若相連及登山巔天自上而山自下君子之取象精矣大壯二月之卦也雷始發聲遏伏之乆乗時而震其壯可知非禮弗履非强有力者不能故曰自勝之謂强朱震曰雷在天上非所履而履故史墨謂雷乗乾臣强之象君子是故動必以正銑謂非據而邪敗亡立至晉日者衆陽之宗假之以為明者若月若星若電若霞是也日乃其自明未出地為地形所蔽及離闇漸騰明著于上晉之象也君子徳本明而自明之氣不能拘欲不能掩上達髙朗之地象日之自地而升也乾之象曰君子以自强不息我用我之剛晉之象曰君子以自昭明徳我用我之明由已而由人乎哉日出於闇曰晉徳去其蔽曰明明夷古之言天者或謂日轉虚空與地相逺今曰日入地中則其説謬矣日惟入地中斯有晝夜若止於天畔旋運則近日為晝逺日為夜此以為晝彼以為夜豈隂陽幽明之故邪方日中天四國大明萬有畢作入地則為明夷夫大明而有闇况於人乎夫水至清則無魚人太察則無徒君子之明必用晦也惟不用其明故能合天下之明為明若察察自昭則蔽之者至矣家人風者火氣之所化炎氣上蒸猛急飄揚者即風也廣中颶大作則空中火飛火極明處風亦盛葢氣所奮激皆風也口鼻之嘘亦然君子知風之自萬化出於家家本之身身修之言行言行之接莫親且乆於家人豈容一毫强飾乎有物有恒則信中而達外矣㢲象言有物入於人也離象行有恒明可見也何粹夫曰風者天機之動日者火精之發風不出於火但取風盛火熾爾睽火性炎上而又在兑澤之上澤性潤下而又在離火之下上不逮下下不奉上故為暌也君子以同而異謂大同之中有不同焉者非立異也同者秉夷之則異者制行之宜子曰君子羣而不黨又曰和而不流同象二女之同異象火澤之異蹇水流而就下勢順而利今在山之上為勢既逆逢石則礙信乎澀滯難行故曰蹇君子遇蹇反求諸身增修厥徳不强通而倖進孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬是也易象示人處難之道有三在屯濟以動故曰經綸在困濟以説故曰遂志在蹇止於善耳故曰修徳屯志在救民困志在善道蹇猶可須也因事舒迫相已進退而酌成之已爾解坎在上則為雲澤未及物也屯也坎在下則為雨澤已及物也解也君子於民過則赦之以其誤也罪但宥之以其故也解者物離舊而更新之時赦宥所以滌其舊而與之更新也過弗赦則非仁罪止寛減則合義雖然小過可赦大過必終其罰可也小罪可宥大罪必極其刑可也赦令數下長奸滋惡非民之幸也赦宥解之義過動震象也罪陷坎象也損澤滅木則大過者澤也上有澤則虚受者山也上有山則損者澤也風得雷則益者雷也象各有所重也山下有澤則澤宼山而山塞澤澤日壅也山日削也揚雄曰山殺瘦澤增髙是也夫人忿有所激而暴發將忘身以及親也欲有所耽而固溺若沿流而靡極也人所當損者莫大是也夫君子所性雖窮居不損而之二者必損之害性故也益風者天之所變雷者火之所化風則陽交於隂而入雷則火伏於隂而出兩皆動機故勢相須驚蟄雷奮矣遇烈風則震者増其勢而愈迅葢若風盛火熾然風以益雷也君子見善慕而遷之若在已有過悔而改之不在大厥徳崇矣人之益孰大於是問曰二者孰難答曰改過尤難必如顔子不貳其庶乎夫事已而心係之朝更而夕忘之古人謂頻復不巳必至迷復故善須累而成過才一而絶損者於此為損益者於彼為益惟兑取兩相麗也楊泉曰積風成雷故曰益夬水氣上天雲興雨降惠及物也君子施禄及下養賢也共治天職必共食天禄也法天禄賢何有可利若以徳自居是有其善也公而私之道所忌也故古人處功惟以謙也氣上蒸水下聚皆謂之澤姤天至髙也物至卑也風自天降與物遇也是故水波谷鳴草偃木撼也后至尊也民至卑也施命誥四方后不親臨也遐陬幽域命悉達也天以風誥萬物后以命誥萬民徳之流行置郵速也四方風動承休命也萃澤上有地聚而為澤萃之象葢川壅為澤乃衆流所滙若彭蠡震澤之類是也夫聚而亡防則民生心君子簡戎器之壊者易而新之以備不虞非右武也易貴未然之防焉升木伏根於地中發芽於地上積以歲月則其髙尋丈可以干霄其大合抱可以蔽日何也順也君子之徳何以異於是順徳猶言率性君子仁義禮智根于心順則遂其始達之基積則循其下學之漸升而不已以成髙大若夫暴行逆徳凌節不順未能升而困隨之矣困澤必資水以利萬物水在澤下是水漏於下而澤枯乏何以資物故為困也君子致命遂志語曰見危授命致命也從吾所好遂志也小人則不然凡可以幸免者无不為卒不免焉徒䘮所守而已體坎以致命體兑以遂志諸家謂天命似未然程子謂以義致命如義可死則死命雖當生不計也裁制在我而已若付窮通於天袖手待盡豈易之敎哉井以木為器汲水而上井之象井鼎又以成器為象焉君子法井之象制為井田使民服田力穡勤勞于下供給乎上勸其相助不敢惰農自安一井養而不窮也革澤以瀦水今乃有火革之大者也葢澤之大者為彭蠡雲夣瀰漫數百里北方大陸之類受河之溢者若歲旱不雨外水不至上為日所熯下為火氣所蒸消乾其水而白地出焉故曰澤中有火革君子治厯明時夫水火相息乃成四時寒暑之變中有數存焉厯所以步其數也厯差則時不明此變之大者也自有厯以來精其術者代有之歲乆必差則治以求合葢天運不齊而厯乃楚法也後世凡學不及古人惟厯則愈精鼎以木入火則火然木木上有熖成亨飪之用鼎之象也君子正其所居之位所謂齊明盛服非禮不動者也定其所出之命所謂堅如金石信如四時者也二者法鼎之重固不遷也朱子謂津潤上行為井或人遂謂火至木杪果熟為鼎葢二卦以成器為象諸卦中自為一例夫人非水火不生活井之汲鼎之亨日用不可須臾而缺也今隆慮山居艱水鑿井至二十丈竟亡泉作土窖儲雪至春夏飲之井之用大矣震相續曰洊上下兩震之象古人迅雷風烈必變况洊雷之震乎君子恐懼心存敬畏矣而又修省畏天以誠也修者飾其善而進之省者察其過而改之周王遇災而懼側身修行天下喜於王化復行故恐懼而亡修省見於聲音顔色之間而已矣艮雷風水火及澤皆兩各能徃來也獨兩山相重各止其所髙下攸分發育之功隨而異人之至難止者心也故取象於艮在上則思止於上在下則思止於下不貳不雜法重艮也彼之言心學者多援艮夫艮者思有所止非視心為槁木而寂之也若靣不相通否之道也體各定用猶事各定理漸地平而氣溫厚生木也易山峻而氣枯燥生木也難易則長茂速難則長茂遲升漸之木分焉木生亡不漸者山産尤不能遽遂也君子居賢徳善俗亦漸也夫俗非一日所能善書稱既厯三紀世變風移然頼周公之治君陳之和畢公之老成選賢徳居位以善民俗謂敎而養之漸染成化非責效於旦莫之間者鴻不再偶女不更夫臣不貳適歸妹雷震澤上澤隨而動長男少女之相感此私情欲恣之時也君子永終知敝使不流於惡葢始合不正終則必乖乖而圖之已亡及矣書曰慎厥終惟其始故早為之謀乃所以永終也卦名歸妹震長男為兄兑少女為妹父不及嫁則兄嫁之葢有國之貴者春秋於魯女適人歸寜之類必書衰世人紀散亂記之見其厚薄内重先君之遺外敦甥舅之好也此卦下三爻二妹也初在下為娣三躐上為須上三爻五歸妹者也四愆期而待上過時而背女不及歸男不授室周禮仲春令㑹男女之亡夫家者豳風殆及公子同歸聖王重人道之原謹昏禮之始也隂從陽動婦以夫歸二氣和而成雨二人合而成家豐雷電交至威焰盛大故曰豐君子取離之明以折獄取震之威以致刑折獄者决其辭而得其情致刑者比諸法而當其罪噬嗑傳曰雷電合而章葢陽氣震發乃閃然成火故雷電止一氣而雷為主如爆杖然火出而聲即透也旅山上有火葢野燒延縁而蹔過者也君子明慎用刑而不留獄旅與獄皆非可乆止之處王制曰刑者侀也侀者成也一成而不可復故君子盡心焉或曰觀六十四象獄起象終于中孚賁當聽訟之初雖守噬嗑之法猶无敢折獄懼乗快之濫也旅在中孚緩獄之前雖得豐之情猶用明慎懼淹禁之瘦也銑謂自旅以前聽訟也中孚死中求生必非怙終之賊仁心如是民將无訟矣巽陣陣相㡭故曰隨風巽申重也申命行事重複申明其命如風㡭至旣告戒之又丁寧之使人聽信然後見之行事民之從之如風之迅矣易巽主敎命觀設敎姤施命蠱振民夫巽之命可順者也命不順而以剛强行之難達巳哉申命必行事不然若今州縣徒掛墻間而已兌道不同則不相説兩澤相麗彼此相滋君子之有友葢同氣相求同志相資者也講習者講而復之或一義而反覆紬繹或衆論而参比協合使理致明白工夫真切則惟力以行之爾若獨學无朋則聞見孤陋一曲之學一時之見自誤且以誤人論語首篇即曰有朋自遠方來不亦樂乎渙風行水上則水㪚故曰渙夫天大无涯神氣无不在人死而降魂氣無不之皆渙也享帝立廟合其㪚於一壇一室也夫郊焉天神格廟焉人鬼享有所寓故爾古者必立廟於東南祭享必以血易多象巽坎巽居東南坎為血卦節澤者匯衆流而成水流至此而止不泛不溢謂之節書曰大野既瀦彭蠡既瀦注曰水停而深者曰瀦君子制數度者因數而起之度如公量私量之𩔖制之使平平則上下安分而不踰矣議徳行者由徳而行之行如隘與不恭之𩔖議之使中中則知愚守道而不失矣數度者經世之制作徳行者反身之修為制之議之皆節之義也中孚風感於澤而澤必應上感於下而下必應皆情之實也故曰中孚議獄緩死乃求其實情而矜恕之議獄者若今矜與疑者上之大理讞之緩死者若今决囚受其訴牒仍錮之再問禮王聽之司冦聽之三公聽旬而職聽二旬而職聽三月而上之古之獄如為親報讎殺人及功貴之屬有司皆不得專决夫人有血氣必争况所居之地所當之人所起之情參互伏匿未易以聰察時日而得故擇人曰良臨審曰哀矜存心曰敬有是三者當詳刑之任庶矣乎小過雷行天上其聲迅暴山上之雷震於髙處其聲殷殷然但能過於澤上之雷而已行過於恭不為敖也若考父是巳喪過於哀不為樂也若髙柴是已用過乎儉不為奢也若晏嬰是已此三者過人之小節耳必也獨立不懼遯世无悶乃大過人之事論其極惟伊周之忠夫子之刪述足以當之旣濟水在火上既能成亨飪之功然物極必反理數然也君子處既濟之世知患之必生思而預防之治亂天運也須人力攴持堯舜有盛无衰能通其變也夫火熾水溢反能滅火況有覆其釡者説者曰儲水防火易之所患者坎險也非離明也未濟火在水上各居其所以順其性而不相資故曰未濟聖人因法象之常以立義辨物如水火之有性居方如上下之有别君子以慎行之察㣲致精物聚於𩔖方分以羣不相侵奪物者儀采器用之品方者列等適用之宜辨之者離之明也居之者坎之流也問曰與同人之辨物何異曰同人别其所同也未濟致之各異也司馬公曰未濟既濟反覆相承未濟君子以矜慎之心辨物之宜處之有道如是則既濟矣他无復為又當思未然之患而預防之是以君子康乂民物永保安樂者也水火不交乃其常水火相交乃其化先聖贊易彖爻隨文生解係辭以下兼明羲畫惟大象探卦象之賾示民用之宜雖剥爛夷誅可安宅莅衆是故不待布筮列卦而能立已澤物雖用三聖之文别發大道於乎其孔易也與程朱𫝊義闡㣲挈蘊於象則畧諸儒求義於嘖乃或迂曲不通銑日味聖言乃考諸家乃出臆見裁截敷衍綴為一卷差若詳明可訓蒙士讀易餘言卷三
